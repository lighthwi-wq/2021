<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  /* ============ TOKENS ============ */
  :root{
    --ink:#0A0A0A;
    --ink-2:#1F1F1F;
    --paper:#F4EFE6;
    --paper-2:#EDE6D8;
    --paper-3:#E5DCC9;
    --line:#0a0a0a14;
    --line-2:#0a0a0a26;
    --muted:#6B6258;
    --muted-2:#9A9088;
    --accent:#FF4D1F;
    --accent-2:#1B3A7A;
    --accent-3:#E8C547;
    --good:#1F7A5A;
    --bad:#9B2D1F;
    --warn:#C76A1A;
    --card:#FFFFFF;
    --card-2:#FAF6EC;
    --overlay:rgba(10,10,10,.4);
    --sheet-bg:#FFFFFF;
    --shadow-sm:0 2px 8px -2px rgba(10,10,10,.08);
    --shadow:0 12px 36px -12px rgba(10,10,10,.18);
    --shadow-lg:0 24px 60px -20px rgba(10,10,10,.28);
    --radius-sm:10px;
    --radius:16px;
    --radius-lg:24px;
    --radius-xl:32px;
    --tap:44px;
    --ease:cubic-bezier(.22,.61,.36,1);
    --ease-out:cubic-bezier(.16,1,.3,1);
    --ease-in:cubic-bezier(.4,0,1,1);
    --dur-fast:160ms;
    --dur:220ms;
    --dur-slow:380ms;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  [data-theme="dark"]{
    --ink:#F4EFE6;
    --ink-2:#E5DCC9;
    --paper:#0F0E0C;
    --paper-2:#181614;
    --paper-3:#22201D;
    --line:#f4efe61c;
    --line-2:#f4efe636;
    --muted:#8A8074;
    --muted-2:#5F5750;
    --card:#1A1815;
    --card-2:#22201D;
    --overlay:rgba(0,0,0,.65);
    --sheet-bg:#1A1815;
    --shadow-sm:0 2px 8px -2px rgba(0,0,0,.4);
    --shadow:0 12px 36px -12px rgba(0,0,0,.55);
    --shadow-lg:0 24px 60px -20px rgba(0,0,0,.7);
  }

  /* ============ RESET ============ */
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  em, i, cite, address{font-style:normal}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Pretendard', system-ui, sans-serif;
    color:var(--ink); background:#0a0a0a;
    line-height:1.5; -webkit-font-smoothing:antialiased;
    overscroll-behavior:none; touch-action:manipulation;
  }
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
  input,textarea,select{font:inherit;color:inherit}
  a{color:inherit;text-decoration:none}
  ::-webkit-scrollbar{width:0;height:0}

  /* ============ DEVICE FRAME ============ */
  .device-wrap{
    height:100%;width:100%;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at top,#1c1816,#0a0a0a 70%);
    padding:24px;
  }
  .device{
    width:100%;max-width:420px;height:100%;max-height:920px;
    background:var(--paper);
    border-radius:48px;
    overflow:hidden;
    position:relative;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.6), 0 0 0 10px #000, 0 0 0 11px #2a2a2a;
    display:flex;flex-direction:column;
  }
  @media (max-width:520px){
    .device-wrap{padding:0;background:var(--paper)}
    .device{max-width:100%;max-height:100%;border-radius:0;box-shadow:none}
  }

  /* ============ STATUS BAR ============ */
  .status-bar{
    height:44px;padding:0 22px 0 24px;
    display:flex;align-items:center;justify-content:space-between;
    font-size:14px;font-weight:600;letter-spacing:-.01em;
    flex-shrink:0;color:var(--ink);
    padding-top:var(--safe-top);
  }
  .status-bar .right{display:flex;align-items:center;gap:6px}
  .status-icon{width:18px;height:11px;display:inline-block}
  .status-icon svg{display:block;width:100%;height:100%;fill:var(--ink)}
  .battery{
    width:25px;height:12px;border:1.2px solid var(--ink);border-radius:3px;
    position:relative;display:flex;align-items:center;padding:1.5px;
  }
  .battery::after{
    content:"";position:absolute;right:-3px;top:3px;
    width:2px;height:6px;background:var(--ink);border-radius:0 1px 1px 0;
  }
  .battery .fill{height:100%;width:80%;background:var(--ink);border-radius:1px}

  /* ============ APP ROOT ============ */
  .app{
    flex:1;display:flex;flex-direction:column;
    overflow:hidden;position:relative;
    background:var(--paper);
  }
  .stage{flex:1;position:relative;overflow:hidden}
  .screen{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    background:var(--paper);
    overflow:hidden;
    transform:translateX(0);
    transition:transform var(--dur) var(--ease), opacity var(--dur) var(--ease);
  }
  .screen.fade-in{animation:fadeIn var(--dur) var(--ease)}
  .screen.slide-in{animation:slideIn var(--dur-slow) var(--ease-out)}
  .screen.slide-out{animation:slideOut var(--dur) var(--ease-in) forwards}
  .screen.slide-up{animation:slideUp var(--dur-slow) var(--ease-out)}
  .screen.slide-down{animation:slideDown var(--dur) var(--ease-in) forwards}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideIn{from{transform:translateX(100%);opacity:.5}to{transform:translateX(0);opacity:1}}
  @keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(-30%);opacity:0}}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes slideDown{from{transform:translateY(0)}to{transform:translateY(100%)}}

  /* ============ APP HEADER ============ */
  .app-header{
    flex-shrink:0;padding:10px 22px 10px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:var(--paper);min-height:52px;
  }
  .app-header .left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
  .app-header .right{display:flex;align-items:center;gap:4px}
  .h-back{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    margin-left:-8px;
    transition:background var(--dur-fast);
  }
  .h-back:active{background:var(--line-2)}
  .h-title{
    font-size:17px;font-weight:700;letter-spacing:-.02em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .h-action{
    width:36px;height:36px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:var(--ink);
    transition:background var(--dur-fast);
  }
  .h-action:active{background:var(--line-2)}
  .h-action.primary{color:var(--accent);font-weight:700;font-size:14px;width:auto;padding:0 10px}

  /* ============ SCROLL BODY ============ */
  .scroll{
    flex:1;overflow-y:auto;overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    padding-bottom:calc(96px + var(--safe-bottom));
  }
  .scroll.no-tab{padding-bottom:24px}

  /* ============ BOTTOM NAV ============ */
  .tab-bar{
    position:absolute;left:0;right:0;bottom:0;
    height:calc(76px + var(--safe-bottom));
    padding-bottom:var(--safe-bottom);
    background:color-mix(in srgb, var(--paper) 92%, transparent);
    backdrop-filter:saturate(180%) blur(20px);
    -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-top:1px solid var(--line);
    display:flex;align-items:stretch;
    z-index:10;
    transform:translateY(0);
    transition:transform var(--dur) var(--ease);
  }
  .tab-bar.hidden{transform:translateY(110%)}
  .tab{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:3px;color:var(--muted);transition:color var(--dur-fast);
    padding-top:8px;
    font-size:10px;font-weight:600;letter-spacing:.02em;
    position:relative;
  }
  .tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .tab.active{color:var(--ink)}
  .tab.active svg{fill:var(--ink);stroke:var(--ink)}
  .tab .fab{
    width:52px;height:52px;border-radius:50%;
    background:var(--ink);color:var(--paper);
    display:flex;align-items:center;justify-content:center;
    box-shadow:var(--shadow);
    margin-bottom:6px;margin-top:-8px;
    transition:transform var(--dur) var(--ease), background var(--dur-fast);
  }
  .tab .fab svg{stroke:var(--paper);width:22px;height:22px}
  .tab:active .fab{transform:scale(.92);background:var(--accent)}
  .tab.center{color:var(--ink);font-weight:700}

  /* ============ TYPOGRAPHY ============ */
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .h1{font-size:34px;font-weight:800;letter-spacing:-.035em;line-height:1.1}
  .h2{font-size:26px;font-weight:800;letter-spacing:-.025em;line-height:1.2}
  .h3{font-size:20px;font-weight:700;letter-spacing:-.02em;line-height:1.25}
  .h4{font-size:16px;font-weight:700;letter-spacing:-.01em;line-height:1.3}
  .body{font-size:15px;line-height:1.55;color:var(--ink)}
  .small{font-size:13px;line-height:1.5;color:var(--muted)}
  .meta{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .num{font-weight:800;letter-spacing:-.03em}

  /* ============ BUTTONS ============ */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    height:52px;padding:0 22px;border-radius:99px;
    font-size:15px;font-weight:700;letter-spacing:-.01em;
    transition:transform var(--dur-fast) var(--ease), background var(--dur-fast), opacity var(--dur-fast);
    min-width:0;
  }
  .btn:active{transform:scale(.97)}
  .btn:disabled{opacity:.4;pointer-events:none}
  .btn-primary{background:var(--ink);color:var(--paper)}
  .btn-secondary{background:var(--line);color:var(--ink)}
  .btn-accent{background:var(--accent);color:#fff}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line-2)}
  .btn-danger{background:transparent;color:var(--bad)}
  .btn-block{width:100%}
  .btn-sm{height:38px;padding:0 16px;font-size:13px}
  .btn-icon{width:44px;height:44px;border-radius:50%;padding:0}

  /* ============ INPUTS ============ */
  .field{margin-bottom:16px}
  .field-label{
    display:block;font-size:12px;font-weight:600;
    color:var(--muted);margin-bottom:8px;letter-spacing:.02em;
  }
  .input,.select,.textarea{
    width:100%;height:52px;padding:0 16px;
    background:var(--card);border:1.5px solid var(--line);
    border-radius:14px;color:var(--ink);font-size:15px;
    transition:border-color var(--dur-fast), background var(--dur-fast);
  }
  .input:focus,.select:focus,.textarea:focus{
    outline:none;border-color:var(--ink);
  }
  .textarea{height:auto;min-height:80px;padding:14px 16px;line-height:1.5;resize:none;font-family:inherit}
  .input-error{border-color:var(--bad)!important}
  .error-msg{color:var(--bad);font-size:12px;margin-top:6px;font-weight:500}

  /* ============ CARDS ============ */
  .card{
    background:var(--card);border-radius:var(--radius-lg);
    padding:20px;box-shadow:var(--shadow-sm);
  }
  .card-flat{background:var(--card-2);border-radius:var(--radius-lg);padding:20px}
  .card-bordered{background:transparent;border:1.5px solid var(--line);border-radius:var(--radius-lg);padding:20px}

  /* ============ AVATARS ============ */
  .avatar{
    border-radius:14px;display:flex;align-items:center;justify-content:center;
    color:#fff;font-weight:800;letter-spacing:-.02em;
    flex-shrink:0;position:relative;
  }
  .avatar-sm{width:36px;height:36px;font-size:15px;border-radius:11px}
  .avatar-md{width:52px;height:52px;font-size:21px;border-radius:14px}
  .avatar-lg{width:72px;height:72px;font-size:28px;border-radius:20px}
  .avatar-xl{width:96px;height:96px;font-size:38px;border-radius:26px}

  /* ============ CHIPS ============ */
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    padding:6px 12px;border-radius:99px;
    font-size:12px;font-weight:600;
    background:var(--line);color:var(--ink);
    white-space:nowrap;
  }
  .chip-outline{background:transparent;border:1px solid var(--line-2)}
  .chip-accent{background:var(--accent);color:#fff}
  .chip-good{background:#1F7A5A1f;color:var(--good)}
  .chip-warn{background:#C76A1A1f;color:var(--warn)}

  /* ============ TOAST ============ */
  .toast-area{
    position:absolute;top:calc(44px + var(--safe-top) + 12px);left:16px;right:16px;
    z-index:200;pointer-events:none;
    display:flex;flex-direction:column;gap:8px;align-items:center;
  }
  .toast{
    background:var(--ink);color:var(--paper);
    padding:12px 18px;border-radius:14px;
    font-size:14px;font-weight:600;
    box-shadow:var(--shadow-lg);
    animation:toastIn var(--dur-slow) var(--ease-out);
    pointer-events:auto;max-width:90%;
  }
  .toast.success{background:var(--good);color:#fff}
  .toast.error{background:var(--bad);color:#fff}
  .toast.out{animation:toastOut var(--dur) var(--ease-in) forwards}
  @keyframes toastIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes toastOut{to{transform:translateY(-20px);opacity:0}}

  /* ============ SHEET ============ */
  .scrim{
    position:absolute;inset:0;background:var(--overlay);
    z-index:100;opacity:0;pointer-events:none;
    transition:opacity var(--dur) var(--ease);
  }
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{
    position:absolute;left:0;right:0;bottom:0;
    background:var(--sheet-bg);
    border-radius:28px 28px 0 0;
    z-index:110;max-height:88%;
    transform:translateY(100%);
    transition:transform var(--dur-slow) var(--ease-out);
    display:flex;flex-direction:column;
    padding-bottom:var(--safe-bottom);
    box-shadow:var(--shadow-lg);
  }
  .sheet.open{transform:translateY(0)}
  .sheet-handle{
    width:36px;height:4px;background:var(--line-2);border-radius:99px;
    margin:10px auto 6px;flex-shrink:0;
  }
  .sheet-head{
    padding:8px 22px 16px;flex-shrink:0;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .sheet-title{font-size:18px;font-weight:700;letter-spacing:-.02em;flex:1}
  .sheet-body{flex:1;overflow-y:auto;padding:0 22px 24px}

  /* ============ DIALOG ============ */
  .dialog{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-46%) scale(.95);
    width:calc(100% - 48px);max-width:340px;
    background:var(--sheet-bg);border-radius:24px;
    z-index:120;padding:24px;
    opacity:0;pointer-events:none;
    transition:opacity var(--dur) var(--ease), transform var(--dur) var(--ease-out);
    text-align:center;box-shadow:var(--shadow-lg);
  }
  .dialog.open{
    opacity:1;pointer-events:auto;
    transform:translate(-50%,-50%) scale(1);
  }
  .dialog h3{font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px}
  .dialog p{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:20px}
  .dialog .actions{display:flex;gap:8px}
  .dialog .btn{flex:1;height:46px}

  /* ============ LOADER ============ */
  .loader{
    position:absolute;inset:0;background:var(--overlay);
    z-index:130;display:none;
    align-items:center;justify-content:center;
    backdrop-filter:blur(6px);
  }
  .loader.open{display:flex}
  .loader .spin{
    width:42px;height:42px;border:3px solid transparent;
    border-top-color:var(--paper);border-right-color:var(--paper);
    border-radius:50%;animation:spin .9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ============ SPLASH ============ */
  .splash{
    inset:0;background:var(--paper);
    display:flex;flex-direction:column;justify-content:space-between;
    padding:80px 32px 60px;
  }
  .splash-logo{
    display:flex;align-items:center;gap:12px;
    font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  }
  .splash-logo .glyph{
    width:32px;height:32px;border-radius:50%;background:var(--ink);position:relative;
  }
  .splash-logo .glyph::after{
    content:"";position:absolute;width:16px;height:16px;border-radius:50%;
    background:var(--accent);top:8px;left:14px;mix-blend-mode:screen;
  }
  .splash-title{
    font-size:60px;font-weight:800;line-height:1;letter-spacing:-.045em;
    animation:rise .8s var(--ease-out);
  }
  .splash-title .line2{display:block;font-weight:900;color:var(--accent);margin-top:4px}
  .splash-meta{font-size:10px;font-weight:600;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
  @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

  /* ============ ONBOARDING ============ */
  .onb{flex:1;display:flex;flex-direction:column;padding:60px 32px 32px}
  .onb-skip{position:absolute;top:60px;right:24px;color:var(--muted);font-weight:600;font-size:14px;padding:6px 10px;z-index:2}
  .onb-slides{flex:1;display:flex;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;margin:0 -32px;padding:0 32px}
  .onb-slide{flex:0 0 100%;scroll-snap-align:start;display:flex;flex-direction:column;justify-content:center;padding:0 8px}
  .onb-illo{
    width:200px;height:200px;border-radius:50px;
    background:var(--accent);margin:0 auto 32px;
    display:flex;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
  }
  .onb-illo.b2{background:var(--accent-2)}
  .onb-illo.b3{background:var(--accent-3)}
  .onb-illo svg{width:100px;height:100px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .onb-illo.b3 svg{stroke:var(--ink)}
  .onb-title{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1.15;text-align:center;margin-bottom:12px}
  .onb-desc{font-size:15px;line-height:1.55;color:var(--muted);text-align:center;max-width:300px;margin:0 auto}
  .onb-dots{display:flex;justify-content:center;gap:8px;padding:24px 0}
  .onb-dot{width:8px;height:8px;border-radius:50%;background:var(--line-2);transition:all var(--dur) var(--ease)}
  .onb-dot.active{width:24px;background:var(--ink)}

  /* ============ HOME ============ */
  .hero-card{
    margin:0 22px 16px;border-radius:28px;
    background:var(--ink);color:var(--paper);
    padding:24px;position:relative;overflow:hidden;
  }
  .hero-card::before{
    content:"";position:absolute;top:-40px;right:-40px;
    width:180px;height:180px;border-radius:50%;
    background:var(--accent);opacity:.4;filter:blur(20px);
  }
  .hero-card > *{position:relative;z-index:1}
  .hero-row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .hero-name{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:2px}
  .hero-sub{font-size:12px;font-weight:600;letter-spacing:.12em;color:#ffffffaa;text-transform:uppercase}
  .hero-stat{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
    margin-top:14px;
  }
  .hero-stat-item{background:#ffffff14;border-radius:14px;padding:10px;text-align:center}
  .hero-stat-item .v{font-size:18px;font-weight:800;letter-spacing:-.02em}
  .hero-stat-item .l{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.7;margin-top:2px}

  .quick-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:0 22px 24px}
  .qa{
    background:var(--card);border-radius:18px;padding:16px;
    display:flex;flex-direction:column;align-items:flex-start;gap:8px;
    text-align:left;transition:transform var(--dur-fast);
    box-shadow:var(--shadow-sm);
  }
  .qa:active{transform:scale(.97)}
  .qa-icon{
    width:36px;height:36px;border-radius:11px;background:var(--paper-3);
    display:flex;align-items:center;justify-content:center;
  }
  .qa-icon svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .qa-title{font-size:14px;font-weight:700}
  .qa-sub{font-size:11px;color:var(--muted)}

  .section{padding:0 22px;margin-bottom:24px}
  .section-h{display:flex;align-items:end;justify-content:space-between;margin-bottom:12px}
  .section-h .h3{font-size:18px;font-weight:700;letter-spacing:-.02em}
  .section-h .link{font-size:13px;color:var(--muted);font-weight:600}

  /* ============ MATCH ROW ============ */
  .match-list{display:flex;flex-direction:column;gap:8px}
  .match{
    background:var(--card);border-radius:18px;padding:14px;
    display:flex;align-items:center;gap:12px;
    transition:transform var(--dur-fast), background var(--dur-fast);
    width:100%;text-align:left;
    box-shadow:var(--shadow-sm);
  }
  .match:active{transform:scale(.98)}
  .match-body{flex:1;min-width:0}
  .match-name{font-size:15px;font-weight:700;margin-bottom:2px;letter-spacing:-.01em}
  .match-meta{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em}
  .match-reason{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .match-score{text-align:right;flex-shrink:0}
  .match-score .v{font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1}
  .match-score .l{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}

  /* ============ EMPTY ============ */
  .empty{padding:60px 22px;text-align:center;color:var(--muted)}
  .empty-icon{
    width:64px;height:64px;border-radius:20px;margin:0 auto 16px;
    background:var(--card-2);display:flex;align-items:center;justify-content:center;
  }
  .empty-icon svg{width:28px;height:28px;stroke:var(--muted);fill:none;stroke-width:1.8}
  .empty-title{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px}
  .empty-desc{font-size:13px;line-height:1.5;margin-bottom:20px;max-width:240px;margin-left:auto;margin-right:auto}

  /* ============ ANALYZE WIZARD ============ */
  .wiz-progress{
    height:3px;background:var(--line);margin:0 22px;border-radius:99px;overflow:hidden;
  }
  .wiz-progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width var(--dur-slow) var(--ease-out);width:0}
  .wiz-step{padding:24px 22px}
  .wiz-step-num{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;margin-bottom:10px}
  .wiz-q{font-size:26px;font-weight:800;letter-spacing:-.025em;line-height:1.2;margin-bottom:8px}
  .wiz-q em{color:var(--accent);font-weight:800}
  .wiz-hint{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:24px}

  .mbti-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .mbti-chip{
    padding:14px 0;border:1.5px solid var(--line-2);background:transparent;
    border-radius:14px;font-size:13px;font-weight:700;letter-spacing:.04em;
    transition:all var(--dur-fast);
  }
  .mbti-chip:active{transform:scale(.95)}
  .mbti-chip small{display:block;font-size:9px;color:var(--muted);margin-top:3px;font-weight:500;letter-spacing:0}
  .mbti-chip.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
  .mbti-chip.selected small{color:#ffffffcc}

  .tags{display:flex;flex-wrap:wrap;gap:8px}
  .tag-btn{
    padding:10px 14px;border:1.5px solid var(--line-2);background:transparent;
    border-radius:99px;font-size:13px;font-weight:600;
    transition:all var(--dur-fast);
  }
  .tag-btn:active{transform:scale(.96)}
  .tag-btn.selected{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  .seg{display:flex;background:var(--card-2);border-radius:14px;padding:4px;gap:4px}
  .seg-btn{
    flex:1;height:42px;border-radius:10px;
    font-size:13px;font-weight:600;color:var(--muted);
    transition:all var(--dur-fast);
  }
  .seg-btn.active{background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm)}

  .wiz-actions{
    padding:16px 22px calc(24px + var(--safe-bottom));
    display:flex;gap:10px;
    border-top:1px solid var(--line);background:var(--paper);
  }

  /* ============ RESULT ============ */
  .result-hero{
    margin:0 22px 16px;border-radius:28px;
    background:var(--ink);color:var(--paper);
    padding:24px;position:relative;overflow:hidden;
  }
  .result-hero::before{
    content:"";position:absolute;top:-60px;left:-60px;
    width:240px;height:240px;border-radius:50%;
    background:var(--accent);opacity:.35;filter:blur(40px);
  }
  .result-hero::after{
    content:"";position:absolute;bottom:-80px;right:-40px;
    width:200px;height:200px;border-radius:50%;
    background:var(--accent-2);opacity:.4;filter:blur(40px);
  }
  .result-hero > *{position:relative;z-index:1}

  /* ============ TEAM CARD ============ */
  .team-card{
    background:var(--card);border-radius:18px;padding:16px;
    display:block;width:100%;text-align:left;
    transition:transform var(--dur-fast);
    box-shadow:var(--shadow-sm);
  }
  .team-card:active{transform:scale(.98)}
  .team-card-name{font-size:16px;font-weight:700;margin-bottom:6px;letter-spacing:-.01em}
  .team-card-meta{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;margin-bottom:12px}
  .team-card-avatars{display:flex;align-items:center}
  .team-card-avatars .avatar{
    width:30px;height:30px;font-size:13px;border-radius:9px;
    border:2px solid var(--card);margin-left:-8px;
  }
  .team-card-avatars .avatar:first-child{margin-left:0}
  .team-card-avatars .more{
    width:30px;height:30px;border-radius:9px;
    background:var(--card-2);color:var(--muted);
    border:2px solid var(--card);margin-left:-8px;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;font-weight:700;
  }

  /* ============ TEAM DETAIL / CHEMISTRY ============ */
  .chem-radar{
    display:flex;flex-direction:column;gap:12px;margin-top:8px;
  }
  .chem-bar{display:flex;align-items:center;gap:10px}
  .chem-bar-label{font-size:12px;font-weight:600;flex:0 0 70px}
  .chem-bar-track{
    flex:1;height:8px;background:var(--line);border-radius:99px;overflow:hidden;
  }
  .chem-bar-fill{
    height:100%;background:var(--ink);border-radius:99px;
    transition:width var(--dur-slow) var(--ease-out);
  }
  .chem-bar.high .chem-bar-fill{background:var(--good)}
  .chem-bar.mid .chem-bar-fill{background:var(--accent-3)}
  .chem-bar.low .chem-bar-fill{background:var(--warn)}
  .chem-bar-val{font-size:13px;font-weight:700;flex:0 0 36px;text-align:right;letter-spacing:-.02em}

  .mbti-dist{
    display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
    margin-top:8px;
  }
  .mbti-dist-cell{
    aspect-ratio:1.4;background:var(--card-2);border-radius:10px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
  }
  .mbti-dist-cell.has{background:var(--accent)}
  .mbti-dist-cell.has .mbti-type{color:#fff}
  .mbti-dist-cell.has .mbti-count{color:#ffffffe6}
  .mbti-type{font-size:11px;font-weight:700;letter-spacing:.05em}
  .mbti-count{font-size:9px;font-weight:600;margin-top:1px;color:var(--muted-2)}

  .balance-bar{
    display:flex;height:36px;border-radius:12px;overflow:hidden;
    margin-top:8px;background:var(--card-2);
  }
  .balance-side{
    flex:1;display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;color:var(--ink);
    transition:flex var(--dur-slow) var(--ease-out);
  }
  .balance-side.e{background:var(--accent-3)}
  .balance-side.i{background:var(--accent-2);color:#fff}

  /* ============ TEAM BUILDER ============ */
  .builder-search{
    padding:12px 22px;background:var(--paper);
    border-bottom:1px solid var(--line);
    display:flex;flex-direction:column;gap:10px;
  }
  .search-input-wrap{
    position:relative;
  }
  .search-input{
    width:100%;height:44px;padding:0 16px 0 42px;
    background:var(--card-2);border:0;border-radius:14px;
    font-size:14px;color:var(--ink);
  }
  .search-input::placeholder{color:var(--muted)}
  .search-icon{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    width:18px;height:18px;stroke:var(--muted);fill:none;stroke-width:2;
    pointer-events:none;
  }
  .filter-row{
    display:flex;gap:6px;overflow-x:auto;
    margin:0 -22px;padding:0 22px;
  }
  .filter-chip{
    flex:0 0 auto;padding:7px 12px;border-radius:99px;
    font-size:12px;font-weight:600;
    background:var(--card-2);color:var(--muted);
    transition:all var(--dur-fast);
  }
  .filter-chip.active{background:var(--ink);color:var(--paper)}

  .builder-row{
    background:transparent;border-bottom:1px solid var(--line);
    padding:14px 22px;
    display:flex;align-items:center;gap:12px;width:100%;
    transition:background var(--dur-fast);
  }
  .builder-row:active{background:var(--card-2)}
  .builder-row.selected{background:#FF4D1F0d}
  .builder-body{flex:1;min-width:0}
  .builder-name{font-size:15px;font-weight:700;margin-bottom:2px}
  .builder-meta{font-size:11px;color:var(--muted);font-weight:600}
  .builder-check{
    width:24px;height:24px;border-radius:50%;
    border:1.5px solid var(--line-2);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    transition:all var(--dur-fast);
  }
  .builder-check svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:3;opacity:0;transition:opacity var(--dur-fast)}
  .builder-row.selected .builder-check{background:var(--accent);border-color:var(--accent)}
  .builder-row.selected .builder-check svg{opacity:1}

  .builder-bar{
    position:absolute;left:0;right:0;bottom:0;
    background:var(--ink);color:var(--paper);
    padding:16px 22px;
    padding-bottom:calc(16px + var(--safe-bottom));
    display:flex;align-items:center;gap:12px;
    transform:translateY(100%);transition:transform var(--dur) var(--ease-out);
    z-index:5;
  }
  .builder-bar.show{transform:translateY(0)}
  .builder-bar-info{flex:1}
  .builder-bar-count{font-size:18px;font-weight:800;letter-spacing:-.02em}
  .builder-bar-hint{font-size:11px;opacity:.7;font-weight:600;letter-spacing:.04em}

  /* ============ INSIGHTS ============ */
  .insight-card{
    background:var(--card);border-radius:18px;padding:18px;margin-bottom:12px;
    box-shadow:var(--shadow-sm);
  }
  .insight-h{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .insight-icon{
    width:32px;height:32px;border-radius:10px;background:var(--paper-3);
    display:flex;align-items:center;justify-content:center;
  }
  .insight-icon svg{width:16px;height:16px;stroke:var(--ink);fill:none;stroke-width:2;stroke-linecap:round}
  .insight-icon.good{background:#1F7A5A1f}
  .insight-icon.good svg{stroke:var(--good)}
  .insight-icon.warn{background:#C76A1A1f}
  .insight-icon.warn svg{stroke:var(--warn)}
  .insight-title{font-size:15px;font-weight:700;letter-spacing:-.01em}
  .insight-body{font-size:13px;color:var(--muted);line-height:1.55}

  .score-ring{
    width:120px;height:120px;margin:0 auto 16px;position:relative;
  }
  .score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
  .score-ring .track{fill:none;stroke:var(--line);stroke-width:8}
  .score-ring .fill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;
    transition:stroke-dashoffset var(--dur-slow) var(--ease-out)}
  .score-ring-text{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }
  .score-ring-text .v{font-size:32px;font-weight:800;letter-spacing:-.03em;line-height:1}
  .score-ring-text .l{font-size:10px;font-weight:600;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-top:4px}

  /* ============ SETTINGS ============ */
  .settings-list{padding:0 16px}
  .setting-group{
    background:var(--card);border-radius:16px;
    margin-bottom:16px;overflow:hidden;
    box-shadow:var(--shadow-sm);
  }
  .setting-group-title{
    font-size:11px;font-weight:600;color:var(--muted);
    letter-spacing:.12em;text-transform:uppercase;
    padding:8px 12px 6px;
  }
  .setting-row{
    width:100%;padding:14px 16px;display:flex;align-items:center;gap:12px;
    text-align:left;border-bottom:1px solid var(--line);
    transition:background var(--dur-fast);
  }
  .setting-row:last-child{border-bottom:0}
  .setting-row:active{background:var(--card-2)}
  .setting-icon{
    width:28px;height:28px;border-radius:8px;background:var(--paper-3);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .setting-icon svg{width:14px;height:14px;stroke:var(--ink);fill:none;stroke-width:2;stroke-linecap:round}
  .setting-body{flex:1;min-width:0}
  .setting-title{font-size:14px;font-weight:600;margin-bottom:1px}
  .setting-sub{font-size:11px;color:var(--muted)}
  .setting-value{font-size:12px;color:var(--muted);font-weight:600}
  .setting-chev{
    width:18px;height:18px;stroke:var(--muted-2);fill:none;stroke-width:2;flex-shrink:0;
  }

  /* ============ THEME SEG ============ */
  .theme-seg{display:flex;gap:6px;padding:8px 16px}
  .theme-opt{
    flex:1;padding:10px;border-radius:12px;
    background:var(--card-2);font-size:12px;font-weight:600;
    transition:all var(--dur-fast);
    display:flex;flex-direction:column;align-items:center;gap:4px;
  }
  .theme-opt svg{width:18px;height:18px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round}
  .theme-opt.active{background:var(--ink);color:var(--paper)}
  .theme-opt.active svg{stroke:var(--paper)}

  /* ============ STAGGER ============ */
  .stagger > *{opacity:0;transform:translateY(8px);animation:stag .4s var(--ease-out) forwards}
  .stagger > *:nth-child(1){animation-delay:.04s}
  .stagger > *:nth-child(2){animation-delay:.08s}
  .stagger > *:nth-child(3){animation-delay:.12s}
  .stagger > *:nth-child(4){animation-delay:.16s}
  .stagger > *:nth-child(5){animation-delay:.20s}
  .stagger > *:nth-child(6){animation-delay:.24s}
  .stagger > *:nth-child(7){animation-delay:.28s}
  .stagger > *:nth-child(8){animation-delay:.32s}
  @keyframes stag{to{opacity:1;transform:translateY(0)}}

  /* ============ PRODUCTION ADDITIONS ============ */

  /* App icon glyph for splash */
  .app-icon-lg{
    width:96px;height:96px;border-radius:24px;
    background:var(--accent);
    display:grid;place-items:center;
    box-shadow:0 12px 36px -8px rgba(255,77,31,.45), inset 0 1px 0 rgba(255,255,255,.2);
    position:relative;
    animation:icon-pop .8s var(--ease-out) backwards;
  }
  @keyframes icon-pop{
    0%{transform:scale(.6);opacity:0}
    60%{transform:scale(1.08)}
    100%{transform:scale(1);opacity:1}
  }
  .app-icon-lg svg{width:60%;height:60%}

  /* Splash progress */
  .splash-progress{
    width:80px;height:2px;background:rgba(244,239,230,.2);
    border-radius:2px;overflow:hidden;margin:24px auto 0;
  }
  .splash-progress-fill{
    height:100%;background:var(--paper);width:0%;
    animation:loadProgress 1.5s var(--ease-out) forwards;
  }
  @keyframes loadProgress{to{width:100%}}

  /* Avatar with photo */
  .avatar.has-photo{background-image:var(--photo);background-size:cover;background-position:center;color:transparent}
  .avatar-edit{
    position:absolute;right:-2px;bottom:-2px;
    width:28px;height:28px;border-radius:50%;
    background:var(--ink);color:var(--paper);
    display:grid;place-items:center;
    border:3px solid var(--card);
    cursor:pointer;
  }
  .avatar-edit svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
  .avatar-wrap{position:relative;display:inline-block}

  /* Notification badge dot */
  .h-action{position:relative}
  .h-action .badge-dot{
    position:absolute;top:6px;right:6px;
    width:8px;height:8px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 2px var(--paper);
    animation:pulse-dot 2s infinite;
  }
  @keyframes pulse-dot{
    0%,100%{transform:scale(1);opacity:1}
    50%{transform:scale(1.3);opacity:.7}
  }

  /* Pull to refresh */
  .ptr-indicator{
    position:absolute;left:50%;top:calc(var(--safe-top) + 50px);
    transform:translateX(-50%) translateY(-50px);
    width:36px;height:36px;border-radius:50%;
    background:var(--card);box-shadow:var(--shadow);
    display:grid;place-items:center;
    transition:transform .25s var(--ease-out), opacity .2s;
    opacity:0;z-index:80;pointer-events:none;
  }
  .ptr-indicator.visible{opacity:1}
  .ptr-indicator.refreshing svg{animation:spin 1s linear infinite}
  .ptr-indicator svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2;stroke-linecap:round;transition:transform .15s}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* Skeleton */
  .skel{
    background:linear-gradient(90deg, var(--paper-2), var(--paper-3), var(--paper-2));
    background-size:200% 100%;
    animation:skel 1.4s linear infinite;
    border-radius:8px;
  }
  @keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .skel-line{height:12px;margin-bottom:8px}
  .skel-line.lg{height:18px}
  .skel-line.sm{height:9px}
  .skel-circle{width:48px;height:48px;border-radius:50%}

  /* Achievements */
  .ach-strip{
    display:flex;gap:10px;overflow-x:auto;padding:4px 22px 4px;margin:0 -22px;
    scrollbar-width:none;
  }
  .ach-strip::-webkit-scrollbar{display:none}
  .ach-card{
    flex:0 0 auto;width:104px;
    padding:14px 10px;border-radius:18px;
    background:var(--card);
    text-align:center;
    border:1px solid var(--line);
    transition:transform .2s var(--ease-out);
  }
  .ach-card.locked{opacity:.45;filter:grayscale(.6)}
  .ach-card:active{transform:scale(.97)}
  .ach-icon{
    width:44px;height:44px;border-radius:14px;
    margin:0 auto 8px;display:grid;place-items:center;
    background:var(--accent);color:#fff;
  }
  .ach-card.locked .ach-icon{background:var(--paper-3);color:var(--muted)}
  .ach-icon svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .ach-name{font-size:11px;font-weight:700;line-height:1.2;letter-spacing:-.005em;margin-bottom:2px}
  .ach-sub{font-size:9px;color:var(--muted);font-weight:500}

  /* Achievement detail in sheet */
  .ach-detail{
    display:flex;align-items:center;gap:12px;
    padding:12px;border-radius:14px;background:var(--card-2);margin-bottom:8px;
  }
  .ach-detail.locked{opacity:.5}
  .ach-detail .ach-icon{width:48px;height:48px;margin:0;border-radius:12px}
  .ach-detail-body{flex:1;min-width:0}
  .ach-detail-title{font-size:14px;font-weight:700;margin-bottom:2px}
  .ach-detail-sub{font-size:11px;color:var(--muted);line-height:1.4}

  /* Long-press feedback */
  .pressable{transition:transform .12s var(--ease-out), background-color .12s}
  .pressable.pressing{transform:scale(.98);background-color:var(--paper-2)}

  /* Swipe to delete */
  .swipe-wrap{position:relative;overflow:hidden;border-radius:14px}
  .swipe-actions{
    position:absolute;right:0;top:0;bottom:0;
    display:flex;align-items:stretch;
  }
  .swipe-action{
    display:flex;align-items:center;justify-content:center;
    padding:0 22px;font-size:13px;font-weight:700;
    color:#fff;background:var(--bad);
    min-width:80px;
  }
  .swipe-action svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;margin-right:6px}
  .swipe-front{
    position:relative;z-index:2;background:var(--card);
    transition:transform .25s var(--ease-out);
    will-change:transform;
  }
  .swipe-front.dragging{transition:none}

  /* Radar chart */
  .radar-wrap{position:relative;width:100%;max-width:280px;margin:0 auto;aspect-ratio:1}
  .radar svg{width:100%;height:100%;overflow:visible}
  .radar .grid{fill:none;stroke:var(--line-2);stroke-width:1}
  .radar .axis{stroke:var(--line);stroke-width:1}
  .radar .area{fill:var(--accent);fill-opacity:.18;stroke:var(--accent);stroke-width:2;stroke-linejoin:round}
  .radar .point{fill:var(--accent);stroke:var(--card);stroke-width:2}
  .radar .label{font-size:10px;font-weight:700;fill:var(--ink);letter-spacing:.04em}
  .radar .label-val{font-size:9px;font-weight:600;fill:var(--muted)}

  /* Animated counter */
  .counter{display:inline-block;font-variant-numeric:tabular-nums}

  /* Install prompt banner */
  .install-banner{
    position:absolute;left:12px;right:12px;
    bottom:calc(72px + var(--safe-bottom) + 12px);
    background:var(--ink);color:var(--paper);
    border-radius:18px;padding:14px 16px;
    box-shadow:var(--shadow-lg);
    display:flex;align-items:center;gap:12px;
    z-index:90;
    transform:translateY(120%);opacity:0;
    transition:transform .35s var(--ease-out), opacity .25s;
  }
  .install-banner.visible{transform:translateY(0);opacity:1}
  .install-banner .ic{
    flex:0 0 auto;width:36px;height:36px;border-radius:10px;
    background:var(--accent);display:grid;place-items:center;
  }
  .install-banner .ic svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round}
  .install-banner .b-body{flex:1;min-width:0}
  .install-banner .b-title{font-size:13px;font-weight:700;margin-bottom:1px}
  .install-banner .b-sub{font-size:11px;opacity:.7}
  .install-banner button{
    background:var(--paper);color:var(--ink);
    padding:7px 12px;border-radius:10px;font-size:12px;font-weight:700;
  }
  .install-banner .b-close{background:transparent;color:var(--paper);padding:4px;opacity:.6}

  /* Empty state illustration */
  .empty-illo{
    width:120px;height:120px;margin:0 auto 16px;
    background:var(--paper-2);border-radius:50%;
    display:grid;place-items:center;
  }
  .empty-illo svg{width:60%;height:60%;stroke:var(--muted-2);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
  .empty-title{font-size:17px;font-weight:800;letter-spacing:-.015em;margin-bottom:6px}
  .empty-sub{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.55}

  /* Notification inbox list */
  .notif-row{
    display:flex;gap:12px;align-items:flex-start;
    padding:14px 4px;border-bottom:1px solid var(--line);
    text-align:left;width:100%;
  }
  .notif-row.unread{position:relative}
  .notif-row.unread::before{
    content:'';position:absolute;left:-6px;top:22px;
    width:6px;height:6px;border-radius:50%;background:var(--accent);
  }
  .notif-icon{
    flex:0 0 auto;width:36px;height:36px;border-radius:10px;
    display:grid;place-items:center;
    background:var(--paper-2);color:var(--ink);
  }
  .notif-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
  .notif-icon.accent{background:var(--accent);color:#fff}
  .notif-icon.good{background:#1F7A5A26;color:var(--good)}
  .notif-body{flex:1;min-width:0}
  .notif-title{font-size:14px;font-weight:700;letter-spacing:-.01em;margin-bottom:2px}
  .notif-sub{font-size:12px;color:var(--muted);line-height:1.45}
  .notif-time{font-size:10px;color:var(--muted-2);margin-top:4px;font-weight:600}

  /* Switch toggle */
  .switch{
    position:relative;width:44px;height:26px;
    background:var(--paper-3);border-radius:13px;
    transition:background .2s;flex-shrink:0;cursor:pointer;
    border:0;
  }
  .switch.on{background:var(--accent)}
  .switch::after{
    content:'';position:absolute;left:3px;top:3px;
    width:20px;height:20px;border-radius:50%;
    background:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,.2);
    transition:transform .2s var(--ease-out);
  }
  .switch.on::after{transform:translateX(18px)}

  /* About/Privacy sheet content */
  .doc-h{font-size:14px;font-weight:800;margin:16px 0 8px;letter-spacing:-.01em}
  .doc-p{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:10px}
  .doc-ul{padding-left:18px;margin-bottom:10px}
  .doc-ul li{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:4px}

  /* Share buttons */
  .share-row{display:flex;gap:10px}
  .share-btn{
    flex:1;padding:14px;border-radius:14px;
    background:var(--card);border:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;gap:6px;
    transition:transform .15s, background .15s;
  }
  .share-btn:active{transform:scale(.97);background:var(--paper-2)}
  .share-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round}
  .share-btn span{font-size:11px;font-weight:600}

  /* Tap interactions */
  .btn:active:not(:disabled){transform:scale(.97)}
  .qa:active{transform:scale(.97)}
  .match{transition:transform .12s var(--ease-out), background-color .15s}
  .match:active{transform:scale(.99)}
  .filter-chip, .chip, .tab, .btn, .qa{
    transition:transform .12s var(--ease-out), background-color .15s, color .15s;
  }

  /* Confetti for achievement unlock */
  .confetti{
    position:absolute;width:8px;height:14px;
    border-radius:2px;
    animation:confetti-fall 1.6s var(--ease-in) forwards;
    pointer-events:none;
  }
  @keyframes confetti-fall{
    0%{transform:translateY(-100px) rotate(0deg);opacity:1}
    100%{transform:translateY(600px) rotate(720deg);opacity:0}
  }

  /* ============ UTILS ============ */
  .row{display:flex;align-items:center;gap:10px}
  .row-between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .stack{display:flex;flex-direction:column;gap:10px}
  .mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
  .mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-24{margin-bottom:24px}
  .px-22{padding-left:22px;padding-right:22px}
  .text-center{text-align:center}
  .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hidden{display:none!important}

</style>
</head>

/* ===================================================================

   =================================================================== */
'use strict';

/* ---------- Constants ---------- */
const STORAGE_KEY = 'oneteam:v1';
const SCHEMA_VERSION = 2;
const APP_VERSION = '1.1.0';

const MBTI_TYPES = ['INTJ','INTP','ENTJ','ENTP','INFJ','INFP','ENFJ','ENFP','ISTJ','ISFJ','ESTJ','ESFJ','ISTP','ISFP','ESTP','ESFP'];

const MBTI_COMPLEMENT = {

  INFJ:['ENTP','ENFP'], INFP:['ENTJ','ENFJ'], ENFJ:['INFP','ISFP'], ENFP:['INTJ','INFJ'],
  ISTJ:['ESFP','ESTP'], ISFJ:['ESFP','ESTP'], ESTJ:['INTP','ISTP'], ESFJ:['ISFP','ISTP'],
  ISTP:['ESFJ','ESTJ'], ISFP:['ESFJ','ENFJ'], ESTP:['ISFJ','ISTJ'], ESFP:['ISFJ','ISTJ'],
};
const TRAITS = ['리더십','꼼꼼함','창의성','분석력','공감','실행력','협업','독립적','신중함','추진력','유연성','책임감'];
const BLOOD_TYPES = ['A','B','O','AB'];
const FAMILY_ROLES = ['첫째','중간','막내','외동'];
const AVATAR_PALETTE = ['#FF4D1F','#1B3A7A','#E8C547','#1F7A5A','#9B2D1F','#C76A1A','#5E4A8A','#2D6B7A','#7A5C2E','#4A2E5E','#1F5A7A','#7A1F5A'];

const DEFAULT_POOL = [
  {id:'m_jgy', name:'정광용', age:48, gender:'M', mbti:'ENTJ', traits:['리더십','추진력','책임감','실행력'], blood:'A', familyRole:'첫째', role:'위원회 / 총괄 매니저'},
  {id:'m_yys', name:'유연승', age:34, gender:'M', mbti:'ENTP', traits:['창의성','유연성','협업','분석력'], blood:'B', familyRole:'중간', role:'프런트엔드 개발자'},
  {id:'m_csc', name:'최순철', age:42, gender:'M', mbti:'ENTP', traits:['창의성','분석력','독립적','추진력'], blood:'O', familyRole:'첫째', role:'시니어 개발자'},
  {id:'m_sho', name:'서형오', age:38, gender:'M', mbti:'ISTJ', traits:['꼼꼼함','신중함','책임감','분석력'], blood:'A', familyRole:'막내', role:'백엔드 개발자'},
  {id:'m_kjm', name:'김지민', age:29, gender:'F', mbti:'INFJ', traits:['공감','창의성','분석력','신중함'], blood:'AB', familyRole:'외동', role:'프로덕트 디자이너'},

  {id:'m_hye', name:'한예진', age:27, gender:'F', mbti:'ESFJ', traits:['협업','공감','책임감','꼼꼼함'], blood:'A', familyRole:'막내', role:'운영 매니저'},
  {id:'m_jkw', name:'장경원', age:45, gender:'M', mbti:'ISTP', traits:['실행력','독립적','분석력','유연성'], blood:'O', familyRole:'중간', role:'DevOps 엔지니어'},

];

/* ---------- Store ---------- */
const DEFAULT_STATE = {
  schemaVersion: SCHEMA_VERSION,
  settings: { theme: 'system', firstLaunch: true, version: APP_VERSION, installDismissed: false },
  preferences: { haptic: true, animations: true, notifications: true, fontSize: 'normal' },
  profile: null,
  customMembers: [],
  teams: [],
  history: [],
  achievements: [],
  notifications: [],
};

const ACHIEVEMENTS = [
  { id:'first_profile', name:'첫걸음', desc:'프로필 생성', icon:'M12 5v14M5 12h14' },
  { id:'first_team', name:'팀 빌더', desc:'첫 팀 만들기', icon:'M9 19V9l3-3 3 3v10M2 19h20' },
  { id:'team_5', name:'조직가', desc:'팀 5개 만들기', icon:'M5 12l5 5L20 7' },
  { id:'analysis_10', name:'분석가', desc:'분석 10회', icon:'M4 19V9m6 10V5m6 14v-7m6 7V11' },
  { id:'high_chemistry', name:'드림팀', desc:'케미 90+ 팀 만들기', icon:'M12 2l2.39 7.36H22l-6.18 4.49 2.36 7.27L12 16.62 5.82 21.12l2.36-7.27L2 9.36h7.61z' },
  { id:'big_team', name:'대규모 팀', desc:'8명 팀 만들기', icon:'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z' },

  { id:'all_mbti', name:'MBTI 마스터', desc:'팀에 8가지 MBTI 모음', icon:'M2 12h20M12 2v20' },
];

const Store = {
  state: structuredClone(DEFAULT_STATE),
  load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw){ this.state = structuredClone(DEFAULT_STATE); return; }
      const parsed = JSON.parse(raw);
      // Merge with defaults (handles schema upgrades by filling new fields)
      this.state = {
        ...structuredClone(DEFAULT_STATE),
        ...parsed,
        settings: { ...DEFAULT_STATE.settings, ...(parsed.settings||{}) },
        preferences: { ...DEFAULT_STATE.preferences, ...(parsed.preferences||{}) },
        achievements: parsed.achievements || [],
        notifications: parsed.notifications || [],
        schemaVersion: SCHEMA_VERSION,
      };
    } catch(e){
      console.warn('Store load error', e);
      this.state = structuredClone(DEFAULT_STATE);
    }
  },
  save(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(this.state)); }
    catch(e){ console.warn('Store save error', e); }
  },
  reset(){ this.state = structuredClone(DEFAULT_STATE); this.save(); },
  // helpers
  pool(){ return [...DEFAULT_POOL, ...this.state.customMembers]; },
  member(id){ return this.pool().find(m=>m.id===id); },
  team(id){ return this.state.teams.find(t=>t.id===id); },
};

/* ---------- Utils ---------- */
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
const uid = (prefix='id') => `${prefix}_${Date.now().toString(36)}${Math.random().toString(36).slice(2,7)}`;
const hash = s => { let h=0; for(let i=0;i<s.length;i++){ h=((h<<5)-h)+s.charCodeAt(i); h|=0; } return Math.abs(h); };
const pickColor = seed => AVATAR_PALETTE[hash(String(seed))%AVATAR_PALETTE.length];
const initial = name => (name||'?').trim().charAt(0);
const formatDate = ts => {
  const d = new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if(diff < 60) return '방금';
  if(diff < 3600) return `${Math.floor(diff/60)}분 전`;
  if(diff < 86400) return `${Math.floor(diff/3600)}시간 전`;
  if(diff < 604800) return `${Math.floor(diff/86400)}일 전`;
  return `${d.getMonth()+1}.${d.getDate()}`;
};
const formatDateLong = ts => {
  const d = new Date(ts);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
};
const clamp = (n,min,max) => Math.max(min, Math.min(max, n));

/* ---------- Image upload (downsizes to base64) ---------- */
const ImgUpload = {
  pick(){
    return new Promise((resolve, reject) => {
      const input = $('#photoPicker');
      const onChange = (ev) => {
        input.removeEventListener('change', onChange);
        const file = ev.target.files?.[0];
        input.value = '';
        if(!file){ reject(new Error('no file')); return; }
        if(!/^image\//.test(file.type)){ reject(new Error('not image')); return; }
        if(file.size > 5*1024*1024){ reject(new Error('too large')); return; }
        this.downsize(file).then(resolve).catch(reject);
      };
      input.addEventListener('change', onChange);
      input.click();
    });
  },
  downsize(file, max=240){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, max/Math.max(img.width, img.height));
          const w = Math.round(img.width*scale), h = Math.round(img.height*scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.78));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
};

const Achievements = {
  byId(id){ return ACHIEVEMENTS.find(a => a.id===id); },
  has(id){ return Store.state.achievements.includes(id); },
  unlock(id){
    if(this.has(id)) return false;
    const ach = this.byId(id);
    if(!ach) return false;
    Store.state.achievements.push(id);
    Store.save();
    Haptic.success();

    setTimeout(() => {

  },
  check(){

    if(s.profile && !this.has('first_profile')) this.unlock('first_profile');
    if(s.teams.length >= 1 && !this.has('first_team')) this.unlock('first_team');
    if(s.teams.length >= 5 && !this.has('team_5')) this.unlock('team_5');
    if(s.history.length >= 10 && !this.has('analysis_10')) this.unlock('analysis_10');
    if(s.customMembers.length >= 1 && !this.has('custom_member')) this.unlock('custom_member');

/* ---------- Animated Counter ---------- */
function animateCounter(el, target, dur=900){
  if(!Store.state.preferences.animations){ el.textContent = target; return; }
  const start = 0;
  const t0 = performance.now();
  const tick = (now) => {
    const p = Math.min(1, (now-t0)/dur);
    const eased = 1 - Math.pow(1-p, 3);
    el.textContent = Math.round(start + (target-start)*eased);
    if(p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function animateAllCounters(root=document){
  $$('.counter[data-target]', root).forEach(el => {
    const t = parseInt(el.dataset.target, 10);
    if(!isNaN(t)) animateCounter(el, t);
  });
}

/* ---------- Pull to Refresh ---------- */
const PullRefresh = {
  attach(scrollEl, onRefresh){
    if(!scrollEl) return;
    let startY = 0, currentY = 0, pulling = false, refreshing = false;
    const indicator = $('#ptrIndicator');
    const threshold = 70;

    const reset = () => {
      indicator.classList.remove('visible','refreshing');
      indicator.style.transform = 'translateX(-50%) translateY(-50px)';
      pulling = false;
    };

    scrollEl.addEventListener('touchstart', (e) => {
      if(refreshing) return;
      if(scrollEl.scrollTop > 0) return;
      startY = e.touches[0].clientY;
      pulling = true;
    }, { passive: true });

    scrollEl.addEventListener('touchmove', (e) => {
      if(!pulling || refreshing) return;
      currentY = e.touches[0].clientY;
      const delta = currentY - startY;
      if(delta < 0){ reset(); return; }
      const pull = Math.min(delta * 0.5, 100);
      indicator.classList.add('visible');
      const rot = (pull/threshold) * 180;
      indicator.style.transform = `translateX(-50%) translateY(${pull-20}px)`;
      indicator.querySelector('svg').style.transform = `rotate(${rot}deg)`;
    }, { passive: true });

    const finish = () => {
      if(!pulling || refreshing) return;
      const delta = currentY - startY;
      if(delta > threshold){
        refreshing = true;
        indicator.classList.add('refreshing');
        indicator.style.transform = 'translateX(-50%) translateY(20px)';
        Haptic.light();
        Promise.resolve(onRefresh && onRefresh()).then(() => {
          setTimeout(() => { refreshing = false; reset(); }, 400);
        });
      } else {
        reset();
      }
    };
    scrollEl.addEventListener('touchend', finish);
    scrollEl.addEventListener('touchcancel', finish);
  }
};

/* ---------- Long Press ---------- */
function attachLongPress(el, onLongPress, ms=520){
  let timer = null, sx = 0, sy = 0, fired = false;
  const start = (e) => {
    fired = false;
    const t = e.touches ? e.touches[0] : e;
    sx = t.clientX; sy = t.clientY;
    el.classList.add('pressing');
    timer = setTimeout(() => {
      fired = true;
      Haptic.medium();
      onLongPress(e);
    }, ms);
  };
  const move = (e) => {
    const t = e.touches ? e.touches[0] : e;
    if(Math.abs(t.clientX-sx) > 8 || Math.abs(t.clientY-sy) > 8){
      cancel();
    }
  };
  const cancel = () => {
    if(timer){ clearTimeout(timer); timer = null; }
    el.classList.remove('pressing');
  };
  el.addEventListener('touchstart', start, {passive:true});
  el.addEventListener('touchmove', move, {passive:true});
  el.addEventListener('touchend', cancel);
  el.addEventListener('touchcancel', cancel);
  el.addEventListener('mousedown', start);
  el.addEventListener('mousemove', move);
  el.addEventListener('mouseup', cancel);
  el.addEventListener('mouseleave', cancel);
  // Suppress click after long-press
  el.addEventListener('click', (e) => {
    if(fired){ e.preventDefault(); e.stopImmediatePropagation(); fired = false; }
  }, true);
}

/* ---------- Swipe to Delete ---------- */
function attachSwipeDelete(wrapper, onDelete){
  const front = wrapper.querySelector('.swipe-front');
  if(!front) return;
  let startX = 0, currentX = 0, dragging = false;
  const max = 96;

  const onStart = (e) => {
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX;
    dragging = true;
    front.classList.add('dragging');
  };
  const onMove = (e) => {
    if(!dragging) return;
    const t = e.touches ? e.touches[0] : e;
    const dx = Math.min(0, t.clientX - startX);
    currentX = Math.max(-max*1.2, dx);
    front.style.transform = `translateX(${currentX}px)`;
  };
  const onEnd = () => {
    if(!dragging) return;
    dragging = false;
    front.classList.remove('dragging');
    if(currentX < -max*0.6){
      front.style.transform = `translateX(-${max}px)`;
    } else {
      front.style.transform = 'translateX(0)';
    }
  };
  front.addEventListener('touchstart', onStart, {passive:true});
  front.addEventListener('touchmove', onMove, {passive:true});
  front.addEventListener('touchend', onEnd);
  const actionBtn = wrapper.querySelector('[data-swipe-delete]');
  if(actionBtn) actionBtn.addEventListener('click', () => {
    Haptic.medium();
    onDelete && onDelete();
  });
}

/* ---------- Radar Chart ---------- */
function radarChart(data){
  // data: [{label, value}] (0-100)
  const size = 220, cx = size/2, cy = size/2;
  const r = 78;
  const n = data.length;
  const angleAt = (i) => -Math.PI/2 + (i * 2*Math.PI/n);
  const pt = (i, val) => {
    const a = angleAt(i);
    const rr = r * (val/100);
    return [cx + rr*Math.cos(a), cy + rr*Math.sin(a)];
  };
  const labelPt = (i) => {
    const a = angleAt(i);
    return [cx + (r+18)*Math.cos(a), cy + (r+18)*Math.sin(a)];
  };
  // Grid rings
  const rings = [0.25,0.5,0.75,1].map(k => {
    const pts = data.map((_,i) => {
      const a = angleAt(i);
      return `${cx + r*k*Math.cos(a)},${cy + r*k*Math.sin(a)}`;
    }).join(' ');
    return `<polygon class="grid" points="${pts}"/>`;
  }).join('');
  // Axes
  const axes = data.map((_,i) => {
    const [x,y] = pt(i, 100);
    return `<line class="axis" x1="${cx}" y1="${cy}" x2="${x}" y2="${y}"/>`;
  }).join('');
  // Data polygon
  const dataPts = data.map((d,i) => pt(i, d.value).join(',')).join(' ');
  // Points
  const points = data.map((d,i) => {
    const [x,y] = pt(i, d.value);
    return `<circle class="point" cx="${x}" cy="${y}" r="4"/>`;
  }).join('');
  // Labels
  const labels = data.map((d,i) => {
    const [x,y] = labelPt(i);
    const anchor = Math.abs(x-cx) < 5 ? 'middle' : x > cx ? 'start' : 'end';
    return `
      <text class="label" x="${x}" y="${y}" text-anchor="${anchor}" dominant-baseline="middle">${esc(d.label)}</text>
      <text class="label-val" x="${x}" y="${y+12}" text-anchor="${anchor}" dominant-baseline="middle">${d.value}</text>
    `;
  }).join('');
  return `
    <div class="radar-wrap">
      <div class="radar">
        <svg viewBox="0 0 ${size} ${size}">
          ${rings}
          ${axes}
          <polygon class="area" points="${dataPts}"/>
          ${points}
          ${labels}
        </svg>
      </div>
    </div>
  `;
}

/* ---------- Matching engine ---------- */
function matchScore(user, member){
  if(!user) return 50;
  let s = 50;
  let reasons = [];

  // MBTI: same axis matches + complement bonus
  let mbtiBonus = 0;
  for(let i=0;i<4;i++){
    if(user.mbti[i] === member.mbti[i]) mbtiBonus += 3;
  }
  if(MBTI_COMPLEMENT[user.mbti]?.includes(member.mbti)){
    mbtiBonus += 12; reasons.push(`${user.mbti}와 보완 관계`);
  }
  s += mbtiBonus;

  // Traits: shared interests
  const shared = user.traits.filter(t => member.traits.includes(t));
  s += shared.length * 4;
  if(shared.length >= 2) reasons.push(`공통 성향: ${shared.slice(0,2).join(', ')}`);

  // Family role: complementary roles bonus
  if(user.familyRole !== member.familyRole) s += 4;
  if(user.familyRole === '외동' && member.familyRole !== '외동') s += 2;

  // Age: closer is generally better
  const ageDiff = Math.abs(user.age - member.age);
  if(ageDiff <= 3) s += 6;
  else if(ageDiff <= 7) s += 3;
  else if(ageDiff > 15) s -= 4;

  // Blood type: classic Korean compatibility (subtle)
  const bloodMap = {A:{A:3,B:1,O:5,AB:4},B:{A:1,B:3,O:4,AB:5},O:{A:5,B:4,O:3,AB:2},AB:{A:4,B:5,O:2,AB:3}};
  s += bloodMap[user.blood]?.[member.blood] || 0;

  s = clamp(Math.round(s), 35, 99);
  return { score: s, reasons };
}

function rankPool(user, pool){
  return pool.map(m => {
    const { score, reasons } = matchScore(user, m);
    return { member: m, score, reasons };
  }).sort((a,b) => b.score - a.score);
}

function matchReason(user, m){
  const { reasons } = matchScore(user, m);
  if(reasons.length === 0){
    const shared = user.traits.filter(t => m.traits.includes(t));
    if(shared.length) return `${shared[0]} 성향 공유`;
    return `${m.mbti} 다른 관점`;
  }
  return reasons[0];
}

/* ---------- Team chemistry ---------- */
function analyzeTeam(memberIds){
  const members = memberIds.map(id => Store.member(id)).filter(Boolean);
  if(members.length === 0){
    return { scores:{leadership:0,execution:0,creativity:0,analysis:0,empathy:0}, overall:0, diversity:0, eiBalance:{e:50,i:50}, mbtiDist:{}, strengths:[], gaps:[] };
  }

  // Score axes from traits + MBTI
  let s = {leadership:0, execution:0, creativity:0, analysis:0, empathy:0};
  const traitMap = {
    '리더십':'leadership','추진력':'leadership','책임감':'leadership',
    '실행력':'execution','꼼꼼함':'execution','신중함':'execution',
    '창의성':'creativity','유연성':'creativity',
    '분석력':'analysis','독립적':'analysis',
    '공감':'empathy','협업':'empathy',
  };
  members.forEach(m => {
    m.traits.forEach(t => { if(traitMap[t]) s[traitMap[t]] += 1; });
    // MBTI letter contributions
    if(m.mbti[0]==='E') s.leadership += .5;
    if(m.mbti[1]==='S') s.execution += .5;
    if(m.mbti[1]==='N') s.creativity += .5;
    if(m.mbti[2]==='T') s.analysis += .5;
    if(m.mbti[2]==='F') s.empathy += .5;
    if(m.mbti[3]==='J') s.execution += .3;
    if(m.mbti[3]==='J') s.leadership += .3;
  });
  const maxPer = members.length * 2;
  Object.keys(s).forEach(k => { s[k] = clamp(Math.round(s[k]/maxPer*100), 0, 100); });

  // MBTI distribution
  const mbtiDist = {};
  members.forEach(m => { mbtiDist[m.mbti] = (mbtiDist[m.mbti]||0)+1; });

  // E/I balance
  const eCount = members.filter(m => m.mbti[0]==='E').length;
  const eiBalance = {
    e: Math.round(eCount/members.length*100),
    i: Math.round((members.length-eCount)/members.length*100),
  };

  // Diversity: unique MBTI count
  const diversity = clamp(Math.round(Object.keys(mbtiDist).length / members.length * 100), 0, 100);

  // Strengths and gaps
  const strengths = [], gaps = [];
  Object.entries(s).forEach(([k,v]) => {
    const label = {leadership:'리더십',execution:'실행력',creativity:'창의성',analysis:'분석력',empathy:'공감조율'}[k];
    if(v >= 70) strengths.push(label);
    else if(v < 35) gaps.push(label);
  });

  // Overall = weighted average
  const overall = Math.round((s.leadership + s.execution + s.creativity + s.analysis + s.empathy) / 5);

  return { scores:s, overall, diversity, eiBalance, mbtiDist, strengths, gaps, count: members.length };
}

  if(analysis.strengths.length >= 3) recs.push({ kind:'good', title:'균형 잡힌 팀', body:`${analysis.strengths.join(', ')} 면에서 강점이 두드러집니다. 이대로 시너지를 살려보세요.` });
  if(analysis.diversity >= 75) recs.push({ kind:'good', title:'다양성 우수', body:'서로 다른 MBTI 조합으로 풍부한 관점이 가능한 팀입니다.' });
  if(analysis.overall >= 75 && recs.length===0) recs.push({ kind:'good', title:'완성도 높은 팀', body:'전반적인 케미가 매우 우수합니다. 추가 보강 없이도 충분히 강한 팀입니다.' });
  if(recs.length === 0) recs.push({ kind:'neutral', title:'적절한 출발점', body:'기본기를 갖춘 팀입니다. 프로젝트 성격에 맞춰 1~2명 보강을 검토해보세요.' });
  return recs;
}

/* ===================================================================
   ROUTER
   =================================================================== */
const Router = {
  stack: [],
  current: null,
  render(){
    const route = this.current;
    if(!route) return;
    const view = Views[route.name];
    if(!view){ console.error('No view', route.name); return; }
    const stage = $('#stage');
    const html = view(route.params || {});
    const isFirst = stage.children.length === 0;
    stage.innerHTML = `<div class="screen ${isFirst?'fade-in':route.anim||'slide-in'}">${html}</div>`;
    // Wire up handlers
    if(view.mount) view.mount(route.params || {});
    // Tab bar visibility
    this.updateTabBar(route.name);
  },
  go(name, params={}, opts={}){
    this.stack.push(this.current);
    this.current = { name, params, anim: opts.anim };
    this.render();
  },
  replace(name, params={}, opts={}){
    this.current = { name, params, anim: opts.anim };
    this.render();
  },
  back(){
    if(this.stack.length === 0){ this.replace('home'); return; }
    this.current = this.stack.pop();
    this.render();
  },
  reset(name, params={}){
    this.stack = [];
    this.current = { name, params };
    this.render();
  },
  updateTabBar(name){
    const tabBar = $('#tabBar');
    const hiddenOn = ['splash','onboarding','analyze','result'];
    const showFor = ['home','teams','insights','settings'];
    tabBar.classList.toggle('hidden', !showFor.includes(name));
    $$('.tab', tabBar).forEach(t => {
      t.classList.toggle('active', t.dataset.tab === name);
    });
  },
};

const Toast = {
  show(message, kind='default', duration=2200){
    const el = document.createElement('div');
    el.className = `toast ${kind!=='default'?kind:''}`;
    el.textContent = message;
    $('#toastArea').appendChild(el);
    setTimeout(() => {
      el.classList.add('out');
      setTimeout(() => el.remove(), 220);
    }, duration);
  },
};

const Sheet = {
  current: null,
  open(title, bodyHTML, opts={}){
    $('#sheetHead').innerHTML = `
      <span class="sheet-title">${esc(title)}</span>
      ${opts.headAction || ''}
    `;
    $('#sheetBody').innerHTML = bodyHTML;
    $('#sheet').classList.add('open');
    $('#scrim').classList.add('open');
    this.current = opts;
    if(opts.mount) opts.mount();
  },
  close(){
    $('#sheet').classList.remove('open');
    $('#scrim').classList.remove('open');
    this.current = null;
  },
};

const Dialog = {
  open({title, body, confirmText='확인', cancelText='취소', danger=false, onConfirm}){
    $('#dialogTitle').textContent = title;
    $('#dialogBody').textContent = body || '';
    const confirmBtn = $('#dialogConfirm');
    const cancelBtn = $('#dialogCancel');
    confirmBtn.textContent = confirmText;
    cancelBtn.textContent = cancelText;
    confirmBtn.className = `btn ${danger?'btn-accent':'btn-primary'}`;
    confirmBtn.onclick = () => { this.close(); if(onConfirm) onConfirm(); };
    cancelBtn.onclick = () => this.close();
    $('#dialog').classList.add('open');
    $('#scrim').classList.add('open');
  },
  close(){
    $('#dialog').classList.remove('open');
    if(!$('#sheet').classList.contains('open')) $('#scrim').classList.remove('open');
  },
};

const Loader = {
  show(){ $('#loader').classList.add('open'); },
  hide(){ $('#loader').classList.remove('open'); },
};

const WizState = { step:0, data:{} };
const WIZ_STEPS = ['basic','mbti','traits','blood','family','review'];

function initWizard(existingProfile){
  WizState.step = 0;
  WizState.data = existingProfile ? { ...existingProfile, traits:[...(existingProfile.traits||[])], photo: existingProfile.photo||null } : {
    name:'', age:30, gender:'M', mbti:'', traits:[], blood:'', familyRole:'', photo:null

    </div>

    </div>
  `;

Views.analyze.mount = () => {
  renderWizStep();
  $('#wizBack').addEventListener('click', () => { if(WizState.step===0) confirmExitWiz(); else stepWiz(-1); });
  $('#wizClose').addEventListener('click', confirmExitWiz);
  $('#wizPrev').addEventListener('click', () => stepWiz(-1));
  $('#wizNext').addEventListener('click', () => stepWiz(1));
};

function confirmExitWiz(){
  // If no meaningful input, skip dialog
  const d = WizState.data;
  const empty = !d.name && !d.mbti && (!d.traits || !d.traits.length);
  if(empty){ Router.back(); return; }
  Dialog.open({
    title:'분석을 종료할까요?',
    body:'입력한 내용은 저장되지 않습니다.',
    confirmText:'종료',
    cancelText:'계속',
    danger:true,
    onConfirm: () => Router.back()
  });
}

function renderWizStep(){
  const step = WIZ_STEPS[WizState.step];
  const body = $('#wizStepBody');
  body.innerHTML = STEP_RENDERERS[step]();
  STEP_HANDLERS[step]?.();
  // Update progress
  const fill = $('.wiz-progress-fill');
  if(fill) fill.style.width = `${((WizState.step+1)/WIZ_STEPS.length)*100}%`;
  // Update buttons
  $('#wizPrev').style.visibility = WizState.step===0 ? 'hidden' : 'visible';
  $('#wizNext').textContent = WizState.step===WIZ_STEPS.length-1 ? '분석 시작' : '다음';
}

function stepWiz(dir){
  if(dir > 0 && !validateStep()) return;
  if(dir > 0 && WizState.step === WIZ_STEPS.length-1){
    finishWizard();
    return;
  }
  WizState.step = clamp(WizState.step + dir, 0, WIZ_STEPS.length-1);
  renderWizStep();
  $('#wizScroll').scrollTo({top:0, behavior:'smooth'});
}

function validateStep(){
  const step = WIZ_STEPS[WizState.step];
  const d = WizState.data;
  if(step==='basic'){
    if(!d.name?.trim()){ flagFieldError('name','이름을 입력해주세요'); return false; }
    if(!d.age || d.age<1 || d.age>120){ flagFieldError('age','나이를 확인해주세요'); return false; }
  }
  if(step==='mbti' && !d.mbti){ Toast.show('MBTI를 선택해주세요','error'); return false; }
  if(step==='traits' && (!d.traits || d.traits.length<2)){ Toast.show('최소 2개 이상 선택해주세요','error'); return false; }
  if(step==='blood' && !d.blood){ Toast.show('혈액형을 선택해주세요','error'); return false; }
  if(step==='family' && !d.familyRole){ Toast.show('가족 위치를 선택해주세요','error'); return false; }
  return true;
}

function flagFieldError(field, msg){
  const input = $(`[name="${field}"]`);
  if(input){
    input.classList.add('input-error');
    let err = input.parentElement.querySelector('.error-msg');
    if(!err){ err = document.createElement('div'); err.className='error-msg'; input.parentElement.appendChild(err); }
    err.textContent = msg;
    input.focus();
  }
}

function finishWizard(){
  const d = WizState.data;
  Loader.show();
  setTimeout(() => {
    const profile = {
      id: Store.state.profile?.id || uid('p'),
      name:d.name.trim(),
      age:Number(d.age),
      gender:d.gender,
      mbti:d.mbti,
      traits:[...d.traits],
      blood:d.blood,
      familyRole:d.familyRole,
      photo: d.photo || Store.state.profile?.photo || null,
      createdAt: Store.state.profile?.createdAt || Date.now(),
      updatedAt: Date.now(),
    };
    const wasNew = !Store.state.profile;
    Store.state.profile = profile;
    // Save to history
    const ranked = rankPool(profile, Store.pool()).slice(0,5);
    Store.state.history = [{
      id: uid('h'),
      profileSnapshot: { name:profile.name, mbti:profile.mbti, age:profile.age },
      topMatches: ranked.map(r => ({ memberId:r.member.id, score:r.score })),
      timestamp: Date.now()
    }, ...Store.state.history].slice(0,30);
    Store.save();
    Achievements.check();
    if(wasNew){
      Notif.push({ kind:'info', title:'프로필 생성 완료', body:`${profile.name}님의 ${profile.mbti} 프로필이 만들어졌어요.`, icon:'accent' });
    } else {
      Notif.push({ kind:'info', title:'프로필 업데이트', body:`프로필이 갱신되었습니다.`, icon:'' });
    }
    Loader.hide();
    Haptic.success();
    Router.replace('result');
  }, 900);
}

function confirmExitBuilder(){
  if(BuilderState.selected.size === 0){ Router.back(); return; }
  Dialog.open({
    title:'팀 만들기를 종료할까요?',
    body:'선택한 멤버는 저장되지 않습니다.',
    confirmText:'종료',
    cancelText:'계속',
    danger:true,
    onConfirm:()=>Router.back(),
  });
}

function renderBuilderList(){
  const list = $('#builderList');
  if(!list) return;
  const profile = Store.state.profile;
  let pool = Store.pool();

  // Search filter
  if(BuilderState.search){
    pool = pool.filter(m =>
      m.name.toLowerCase().includes(BuilderState.search) ||
      m.mbti.toLowerCase().includes(BuilderState.search) ||
      (m.role||'').toLowerCase().includes(BuilderState.search)
    );
  }
  // MBTI filter
  if(BuilderState.filter !== 'all'){
    const f = BuilderState.filter;
    pool = pool.filter(m => {
      if(f==='E') return m.mbti[0]==='E';
      if(f==='I') return m.mbti[0]==='I';
      if(f==='NT') return m.mbti[1]==='N' && m.mbti[2]==='T';
      if(f==='NF') return m.mbti[1]==='N' && m.mbti[2]==='F';
      if(f==='SJ') return m.mbti[1]==='S' && m.mbti[3]==='J';
      if(f==='SP') return m.mbti[1]==='S' && m.mbti[3]==='P';
      return true;
    });
  }
  // Sort
  if(BuilderState.sort==='match' && profile){
    pool = rankPool(profile, pool).map(r => ({ ...r.member, _score: r.score }));
  } else if(BuilderState.sort==='name'){
    pool = [...pool].sort((a,b) => a.name.localeCompare(b.name,'ko'));
  } else if(BuilderState.sort==='age'){
    pool = [...pool].sort((a,b) => a.age - b.age);
  } else if(BuilderState.sort==='match'){
    pool = [...pool];
  }

  if(pool.length === 0){
    list.innerHTML = `<div class="empty"><div class="empty-title">결과가 없습니다</div><div class="empty-desc">검색어나 필터를 변경해보세요.</div></div>`;
    return;
  }

  list.innerHTML = pool.map(m => {
    const selected = BuilderState.selected.has(m.id);
    return `
      <button class="builder-row ${selected?'selected':''}" data-pick="${m.id}">
        ${avatarHTML(m,'md')}
        <div class="builder-body">
          <div class="builder-name truncate">${esc(m.name)}${m._score?` <span class="chip chip-outline" style="margin-left:6px;padding:2px 8px;font-size:10px">${m._score}</span>`:''}</div>
          <div class="builder-meta">${esc(m.mbti)} · ${m.age}세${m.role?` · ${esc(m.role)}`:''}</div>
        </div>
        <div class="builder-check">
          <svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7"/></svg>
        </div>
      </button>
    `;
  }).join('');

  $$('[data-pick]', list).forEach(b => b.addEventListener('click', () => {
    const id = b.dataset.pick;
    if(BuilderState.selected.has(id)){
      BuilderState.selected.delete(id);
      b.classList.remove('selected');
    } else if(BuilderState.selected.size < 8){
      BuilderState.selected.add(id);
      b.classList.add('selected');
    } else {
      Toast.show('최대 8명까지 선택할 수 있어요','error');
    }
    updateBuilderBar();
  }));
  updateBuilderBar();
}

function updateBuilderBar(){
  const n = BuilderState.selected.size;
  const bar = $('#builderBar');
  const cnt = $('#builderCount');
  if(cnt) cnt.textContent = `${n}명 선택`;
  if(bar) bar.classList.toggle('show', n >= 2);
}

  // Sheet for team name

      const state = { gender:'M', mbti:'', blood:'', family:'', traits:[] };

        state.gender = b.dataset.g;
        $$('[data-g]', $('#cmGender')).forEach(x => x.classList.toggle('active', x===b));

      $$('[data-m]', $('#cmMbti')).forEach(b => b.addEventListener('click', () => {

      $$('[data-b]', $('#cmBlood')).forEach(b => b.addEventListener('click', () => {

      $$('[data-f]', $('#cmFamily')).forEach(b => b.addEventListener('click', () => {

          name, age, gender:state.gender, mbti:state.mbti,
          traits:[...state.traits], blood:state.blood, familyRole:state.family,
          role: role || undefined,
        };
        Store.state.customMembers.push(member);
        Store.save();

        Toast.show(`${name}님을 추가했어요`,'success');
        // Refresh builder if on builder screen
        if(Router.current.name === 'teamBuilder') renderBuilderList();
      });

function exportData(){
  try {
    const blob = new Blob([JSON.stringify(Store.state, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `oneteam-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    Toast.show('백업 파일을 저장했어요','success');
  } catch(e){
    Toast.show('내보내기 실패','error');
  }
}

function importData(e){
  const file = e.target.files?.[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(!data.schemaVersion) throw new Error('invalid');
      Dialog.open({
        title:'데이터를 가져올까요?',
        body:'현재 데이터가 모두 덮어쓰여집니다.',
        confirmText:'가져오기',
        danger:true,
        onConfirm: () => {
          Store.state = { ...structuredClone(DEFAULT_STATE), ...data, schemaVersion:SCHEMA_VERSION };
          Store.save();
          applyTheme();
          Toast.show('데이터를 복원했어요','success');
          Router.replace('settings');
        }
      });
    } catch(err){
      Toast.show('잘못된 파일 형식이에요','error');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

function confirmReset(){
  Dialog.open({
    title:'모든 데이터를 초기화할까요?',
    body:'프로필, 팀, 분석 기록이 모두 삭제됩니다. 이 작업은 되돌릴 수 없습니다.',
    confirmText:'초기화',
    danger:true,
    onConfirm: () => {
      Store.reset();
      applyTheme();
      Toast.show('초기화 완료','success');
      Router.reset('home');
    }
  });
}

/* ===================================================================
   THEME
   =================================================================== */
function applyTheme(){
  const setting = Store.state.settings.theme;
  let theme = setting;
  if(setting === 'system'){
    theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }
  document.documentElement.setAttribute('data-theme', theme);
  const meta = document.getElementById('meta-theme');
  if(meta) meta.setAttribute('content', theme === 'dark' ? '#0F0E0C' : '#F4EFE6');
}

/* ===================================================================
   TAB SWITCHING
   =================================================================== */
function switchTab(tab){
  if(tab === 'analyze'){
    initWizard(Store.state.profile);
    Router.go('analyze', {}, { anim:'slide-up' });
    return;
  }
  if(tab === Router.current?.name) return;
  Router.reset(tab);
}

/* ===================================================================
   GLOBAL EVENTS
   =================================================================== */
function bindGlobalEvents(){
  // Tab bar
  $$('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));
  // Scrim closes sheet/dialog
  $('#scrim').addEventListener('click', () => {
    if($('#sheet').classList.contains('open')) Sheet.close();
    else if($('#dialog').classList.contains('open')) Dialog.close();
  });
  // System theme change
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if(Store.state.settings.theme === 'system') applyTheme();
  });
  // Clock
  const updateClock = () => {
    const d = new Date();
    const h = d.getHours(), m = d.getMinutes();
    $('#clock').textContent = `${h}:${String(m).padStart(2,'0')}`;
  };
  updateClock(); setInterval(updateClock, 30000);
}

/* ===================================================================
   BOOT
   =================================================================== */
function boot(){
  Store.load();
  applyTheme();
  bindGlobalEvents();
  Router.current = { name:'splash' };
  Router.render();
}

document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
