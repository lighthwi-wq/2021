<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  /* ============ TOKENS ============ */
  :root{
    --ink:#0A0A0A; --ink-2:#1F1F1F; --paper:#F4EFE6; --paper-2:#EDE6D8; --paper-3:#E5DCC9;
    --line:#0a0a0a14; --line-2:#0a0a0a26; --muted:#6B6258; --muted-2:#9A9088;
    --accent:#FF4D1F; --accent-2:#1B3A7A; --accent-3:#E8C547;
    --good:#1F7A5A; --bad:#9B2D1F; --warn:#C76A1A; --card:#FFFFFF; --card-2:#FAF6EC;
    --overlay:rgba(10,10,10,.4); --sheet-bg:#FFFFFF;
    --shadow-sm:0 2px 8px -2px rgba(10,10,10,.08); --shadow:0 12px 36px -12px rgba(10,10,10,.18); --shadow-lg:0 24px 60px -20px rgba(10,10,10,.28);
    --radius-sm:10px; --radius:16px; --radius-lg:24px; --radius-xl:32px;
    --tap:44px; --ease:cubic-bezier(.22,.61,.36,1); --ease-out:cubic-bezier(.16,1,.3,1); --ease-in:cubic-bezier(.4,0,1,1);
    --dur-fast:160ms; --dur:220ms; --dur-slow:380ms;
    --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  [data-theme="dark"]{
    --ink:#F4EFE6; --ink-2:#E5DCC9; --paper:#0F0E0C; --paper-2:#181614; --paper-3:#22201D;
    --line:#f4efe61c; --line-2:#f4efe636; --muted:#8A8074; --muted-2:#5F5750;
    --card:#1A1815; --card-2:#22201D; --overlay:rgba(0,0,0,.65); --sheet-bg:#1A1815;
    --shadow-sm:0 2px 8px -2px rgba(0,0,0,.4); --shadow:0 12px 36px -12px rgba(0,0,0,.55); --shadow-lg:0 24px 60px -20px rgba(0,0,0,.7);
  }

  /* ============ RESET & DEVICE FRAME ============ */
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  em, i, cite, address{font-style:normal}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Pretendard', system-ui, sans-serif;
    color:var(--ink); background:#0a0a0a;
    line-height:1.5; -webkit-font-smoothing:antialiased;
    overscroll-behavior:none; touch-action:manipulation;
  }
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
  input,textarea,select{font:inherit;color:inherit}
  a{color:inherit;text-decoration:none}
  ::-webkit-scrollbar{width:0;height:0}
  
  .device-wrap{
    height:100%;width:100%; display:flex;align-items:center;justify-content:center;
    background:radial-gradient(ellipse at top,#1c1816,#0a0a0a 70%); padding:24px;
  }
  .device{
    width:100%;max-width:420px;height:100%;max-height:920px;
    background:var(--paper); border-radius:48px; overflow:hidden; position:relative;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.6), 0 0 0 10px #000, 0 0 0 11px #2a2a2a;
    display:flex;flex-direction:column;
  }
  @media (max-width:520px){
    .device-wrap{padding:0;background:var(--paper)}
    .device{max-width:100%;max-height:100%;border-radius:0;box-shadow:none}
  }

  /* ============ STATUS BAR & LAYOUT ============ */
  .status-bar{
    height:44px;padding:0 22px 0 24px; display:flex;align-items:center;justify-content:space-between;
    font-size:14px;font-weight:600;letter-spacing:-.01em; flex-shrink:0;color:var(--ink);
    padding-top:var(--safe-top);
  }
  .status-bar .right{display:flex;align-items:center;gap:6px}
  .status-icon{width:18px;height:11px;display:inline-block}
  .status-icon svg{display:block;width:100%;height:100%;fill:var(--ink)}
  .battery{
    width:25px;height:12px;border:1.2px solid var(--ink);border-radius:3px;
    position:relative;display:flex;align-items:center;padding:1.5px;
  }
  .battery::after{
    content:"";position:absolute;right:-3px;top:3px;
    width:2px;height:6px;background:var(--ink);border-radius:0 1px 1px 0;
  }
  .battery .fill{height:100%;width:80%;background:var(--ink);border-radius:1px}

  .app{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;background:var(--paper);}
  .stage{flex:1;position:relative;overflow:hidden}
  .screen{
    position:absolute;inset:0; display:flex;flex-direction:column; background:var(--paper); overflow:hidden;
    transform:translateX(0); transition:transform var(--dur) var(--ease), opacity var(--dur) var(--ease);
  }
  .screen.fade-in{animation:fadeIn var(--dur) var(--ease)}
  .screen.slide-in{animation:slideIn var(--dur-slow) var(--ease-out)}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes slideIn{from{transform:translateX(100%);opacity:.5}to{transform:translateX(0);opacity:1}}

  .app-header{
    flex-shrink:0;padding:10px 22px 10px; display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:var(--paper);min-height:52px;
  }
  .app-header .left{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
  .app-header .right{display:flex;align-items:center;gap:4px}
  .h-back{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-left:-8px;transition:background var(--dur-fast);}
  .h-back:active{background:var(--line-2)}
  .h-title{font-size:17px;font-weight:700;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .h-action{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--ink);transition:background var(--dur-fast);}
  .h-action:active{background:var(--line-2)}

  .scroll{
    flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
    padding-bottom:calc(96px + var(--safe-bottom));
  }
  .scroll.no-tab{padding-bottom:24px}

  /* ============ BOTTOM NAV ============ */
  .tab-bar{
    position:absolute;left:0;right:0;bottom:0; height:calc(76px + var(--safe-bottom)); padding-bottom:var(--safe-bottom);
    background:color-mix(in srgb, var(--paper) 92%, transparent); backdrop-filter:saturate(180%) blur(20px); -webkit-backdrop-filter:saturate(180%) blur(20px);
    border-top:1px solid var(--line); display:flex;align-items:stretch; z-index:10;
    transform:translateY(0); transition:transform var(--dur) var(--ease);
  }
  .tab-bar.hidden{transform:translateY(110%)}
  .tab{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center; gap:3px;color:var(--muted);transition:color var(--dur-fast);
    padding-top:8px; font-size:10px;font-weight:600;letter-spacing:.02em; position:relative;
  }
  .tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .tab.active{color:var(--ink)}
  .tab.active svg{fill:var(--ink);stroke:var(--ink)}
  .tab .fab{
    width:52px;height:52px;border-radius:50%; background:var(--ink);color:var(--paper);
    display:flex;align-items:center;justify-content:center; box-shadow:var(--shadow);
    margin-bottom:6px;margin-top:-8px; transition:transform var(--dur) var(--ease), background var(--dur-fast);
  }
  .tab .fab svg{stroke:var(--paper);width:22px;height:22px}
  .tab:active .fab{transform:scale(.92);background:var(--accent)}
  .tab.center{color:var(--ink);font-weight:700}

  /* ============ TYPOGRAPHY & COMPONENTS ============ */
  .eyebrow{font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .h1{font-size:34px;font-weight:800;letter-spacing:-.035em;line-height:1.1}
  .h2{font-size:26px;font-weight:800;letter-spacing:-.025em;line-height:1.2}
  .h3{font-size:20px;font-weight:700;letter-spacing:-.02em;line-height:1.25}
  .body{font-size:15px;line-height:1.55;color:var(--ink)}
  .small{font-size:13px;line-height:1.5;color:var(--muted)}
  .meta{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    height:52px;padding:0 22px;border-radius:99px; font-size:15px;font-weight:700;letter-spacing:-.01em;
    transition:transform var(--dur-fast) var(--ease), background var(--dur-fast), opacity var(--dur-fast); min-width:0;
  }
  .btn:active{transform:scale(.97)}
  .btn:disabled{opacity:.4;pointer-events:none}
  .btn-primary{background:var(--ink);color:var(--paper)}
  .btn-secondary{background:var(--line);color:var(--ink)}
  .btn-accent{background:var(--accent);color:#fff}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line-2)}
  .btn-danger{background:transparent;color:var(--bad)}
  .btn-block{width:100%}
  .btn-sm{height:38px;padding:0 16px;font-size:13px}

  .field{margin-bottom:16px}
  .field-label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px;letter-spacing:.02em;}
  .input{
    width:100%;height:52px;padding:0 16px; background:var(--card);border:1.5px solid var(--line);
    border-radius:14px;color:var(--ink);font-size:15px; transition:border-color var(--dur-fast), background var(--dur-fast);
  }
  .input:focus{outline:none;border-color:var(--ink);}
  .input-error{border-color:var(--bad)!important}
  .error-msg{color:var(--bad);font-size:12px;margin-top:6px;font-weight:500}

  .card{background:var(--card);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-sm);}
  .card-flat{background:var(--card-2);border-radius:var(--radius-lg);padding:20px}

  .avatar{border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0;position:relative;}
  .avatar-sm{width:36px;height:36px;font-size:15px;border-radius:11px}
  .avatar-md{width:52px;height:52px;font-size:21px;border-radius:14px}
  .avatar-lg{width:72px;height:72px;font-size:28px;border-radius:20px}
  .avatar-xl{width:96px;height:96px;font-size:38px;border-radius:26px}
  .avatar.has-photo{background-image:var(--photo);background-size:cover;background-position:center;color:transparent}
  
  .chip{
    display:inline-flex;align-items:center;gap:6px; padding:6px 12px;border-radius:99px;
    font-size:12px;font-weight:600; background:var(--line);color:var(--ink); white-space:nowrap;
  }
  .chip-outline{background:transparent;border:1px solid var(--line-2)}
  .chip-good{background:#1F7A5A1f;color:var(--good)}
  .chip-warn{background:#C76A1A1f;color:var(--warn)}

  /* ============ OVERLAYS ============ */
  .toast-area{
    position:absolute;top:calc(44px + var(--safe-top) + 12px);left:16px;right:16px; z-index:200;pointer-events:none;
    display:flex;flex-direction:column;gap:8px;align-items:center;
  }
  .toast{
    background:var(--ink);color:var(--paper); padding:12px 18px;border-radius:14px; font-size:14px;font-weight:600;
    box-shadow:var(--shadow-lg); animation:toastIn var(--dur-slow) var(--ease-out); pointer-events:auto;max-width:90%;
  }
  .toast.success{background:var(--good);color:#fff}
  .toast.error{background:var(--bad);color:#fff}
  .toast.out{animation:toastOut var(--dur) var(--ease-in) forwards}
  @keyframes toastIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes toastOut{to{transform:translateY(-20px);opacity:0}}

  .scrim{
    position:absolute;inset:0;background:var(--overlay); z-index:100;opacity:0;pointer-events:none; transition:opacity var(--dur) var(--ease);
  }
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{
    position:absolute;left:0;right:0;bottom:0; background:var(--sheet-bg); border-radius:28px 28px 0 0; z-index:110;max-height:88%;
    transform:translateY(100%); transition:transform var(--dur-slow) var(--ease-out); display:flex;flex-direction:column; padding-bottom:var(--safe-bottom); box-shadow:var(--shadow-lg);
  }
  .sheet.open{transform:translateY(0)}
  .sheet-handle{width:36px;height:4px;background:var(--line-2);border-radius:99px;margin:10px auto 6px;flex-shrink:0;}
  .sheet-head{padding:8px 22px 16px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .sheet-title{font-size:18px;font-weight:700;letter-spacing:-.02em;flex:1}
  .sheet-body{flex:1;overflow-y:auto;padding:0 22px 24px}

  .dialog{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-46%) scale(.95); width:calc(100% - 48px);max-width:340px;
    background:var(--sheet-bg);border-radius:24px; z-index:120;padding:24px; opacity:0;pointer-events:none;
    transition:opacity var(--dur) var(--ease), transform var(--dur) var(--ease-out); text-align:center;box-shadow:var(--shadow-lg);
  }
  .dialog.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1);}
  .dialog h3{font-size:18px;font-weight:700;letter-spacing:-.02em;margin-bottom:8px}
  .dialog p{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:20px}
  .dialog .actions{display:flex;gap:8px}
  .dialog .btn{flex:1;height:46px}

  .loader{position:absolute;inset:0;background:var(--overlay);z-index:130;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);}
  .loader.open{display:flex}
  .loader .spin{
    width:42px;height:42px;border:3px solid transparent; border-top-color:var(--paper);border-right-color:var(--paper);
    border-radius:50%;animation:spin .9s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ============ APP SPECIFIC STYLES ============ */
  /* (Splash, Onboarding, Home, Wizard, Teams, Settings...) 
     기존 제공된 모든 UI 요소의 CSS를 동일하게 유지합니다. 공간 상 핵심 요소 축약 없이 적용 */
  
  .splash{inset:0;background:var(--paper);display:flex;flex-direction:column;justify-content:space-between;padding:80px 32px 60px;}
  .splash-logo{display:flex;align-items:center;gap:12px;font-size:12px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;}
  .splash-logo .glyph{width:32px;height:32px;border-radius:50%;background:var(--ink);position:relative;}
  .splash-logo .glyph::after{content:"";position:absolute;width:16px;height:16px;border-radius:50%;background:var(--accent);top:8px;left:14px;mix-blend-mode:screen;}
  .splash-title{font-size:60px;font-weight:800;line-height:1;letter-spacing:-.045em;animation:rise .8s var(--ease-out);}
  .splash-title .line2{display:block;font-weight:900;color:var(--accent);margin-top:4px}
  .app-icon-lg{width:96px;height:96px;border-radius:24px;background:var(--accent);display:grid;place-items:center;box-shadow:0 12px 36px -8px rgba(255,77,31,.45), inset 0 1px 0 rgba(255,255,255,.2);animation:icon-pop .8s var(--ease-out) backwards;}
  @keyframes icon-pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  
  .hero-card{margin:0 22px 16px;border-radius:28px;background:var(--ink);color:var(--paper);padding:24px;position:relative;overflow:hidden;}
  .hero-card::before{content:"";position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:var(--accent);opacity:.4;filter:blur(20px);}
  .hero-card > *{position:relative;z-index:1}
  .hero-row{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .hero-name{font-size:22px;font-weight:800;letter-spacing:-.02em;margin-bottom:2px}
  .hero-sub{font-size:12px;font-weight:600;letter-spacing:.12em;color:#ffffffaa;text-transform:uppercase}
  .hero-stat{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px;}
  .hero-stat-item{background:#ffffff14;border-radius:14px;padding:10px;text-align:center}
  .hero-stat-item .v{font-size:18px;font-weight:800;letter-spacing:-.02em}
  .hero-stat-item .l{font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.7;margin-top:2px}

  .quick-actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:0 22px 24px}
  .qa{background:var(--card);border-radius:18px;padding:16px;display:flex;flex-direction:column;align-items:flex-start;gap:8px;text-align:left;transition:transform var(--dur-fast);box-shadow:var(--shadow-sm);}
  .qa:active{transform:scale(.97)}
  .qa-icon{width:36px;height:36px;border-radius:11px;background:var(--paper-3);display:flex;align-items:center;justify-content:center;}
  .qa-icon svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .qa-title{font-size:14px;font-weight:700}
  .qa-sub{font-size:11px;color:var(--muted)}

  .section{padding:0 22px;margin-bottom:24px}
  .section-h{display:flex;align-items:end;justify-content:space-between;margin-bottom:12px}
  .section-h .h3{font-size:18px;font-weight:700;letter-spacing:-.02em}
  .section-h .link{font-size:13px;color:var(--muted);font-weight:600}

  .match-list{display:flex;flex-direction:column;gap:8px}
  .match{background:var(--card);border-radius:18px;padding:14px;display:flex;align-items:center;gap:12px;transition:transform var(--dur-fast), background var(--dur-fast);width:100%;text-align:left;box-shadow:var(--shadow-sm);}
  .match:active{transform:scale(.98)}
  .match-body{flex:1;min-width:0}
  .match-name{font-size:15px;font-weight:700;margin-bottom:2px;letter-spacing:-.01em}
  .match-meta{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em}
  .match-reason{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
  .match-score{text-align:right;flex-shrink:0}
  .match-score .v{font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1}
  .match-score .l{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}

  .wiz-progress{height:3px;background:var(--line);margin:0 22px;border-radius:99px;overflow:hidden;}
  .wiz-progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width var(--dur-slow) var(--ease-out);width:0}
  .wiz-step{padding:24px 22px}
  .wiz-step-num{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;margin-bottom:10px}
  .wiz-q{font-size:26px;font-weight:800;letter-spacing:-.025em;line-height:1.2;margin-bottom:8px}
  .wiz-q em{color:var(--accent);font-weight:800}
  .wiz-hint{font-size:13px;color:var(--muted);line-height:1.5;margin-bottom:24px}
  .wiz-actions{padding:16px 22px calc(24px + var(--safe-bottom));display:flex;gap:10px;border-top:1px solid var(--line);background:var(--paper);}

  .mbti-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .mbti-chip{padding:14px 0;border:1.5px solid var(--line-2);background:transparent;border-radius:14px;font-size:13px;font-weight:700;letter-spacing:.04em;transition:all var(--dur-fast);}
  .mbti-chip:active{transform:scale(.95)}
  .mbti-chip.selected{background:var(--accent);color:#fff;border-color:var(--accent);}
  
  .tags{display:flex;flex-wrap:wrap;gap:8px}
  .tag-btn{padding:10px 14px;border:1.5px solid var(--line-2);background:transparent;border-radius:99px;font-size:13px;font-weight:600;transition:all var(--dur-fast);}
  .tag-btn.selected{background:var(--ink);color:var(--paper);border-color:var(--ink)}

  .seg{display:flex;background:var(--card-2);border-radius:14px;padding:4px;gap:4px}
  .seg-btn{flex:1;height:42px;border-radius:10px;font-size:13px;font-weight:600;color:var(--muted);transition:all var(--dur-fast);}
  .seg-btn.active{background:var(--card);color:var(--ink);box-shadow:var(--shadow-sm)}

  .team-card{background:var(--card);border-radius:18px;padding:16px;display:block;width:100%;text-align:left;transition:transform var(--dur-fast);box-shadow:var(--shadow-sm);}
  .team-card:active{transform:scale(.98)}
  .team-card-name{font-size:16px;font-weight:700;margin-bottom:6px;letter-spacing:-.01em}
  .team-card-meta{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em;margin-bottom:12px}
  .team-card-avatars{display:flex;align-items:center}
  .team-card-avatars .avatar{width:30px;height:30px;font-size:13px;border-radius:9px;border:2px solid var(--card);margin-left:-8px;}
  .team-card-avatars .avatar:first-child{margin-left:0}

  .builder-search{padding:12px 22px;background:var(--paper);border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:10px;}
  .search-input-wrap{position:relative;}
  .search-input{width:100%;height:44px;padding:0 16px 0 42px;background:var(--card-2);border:0;border-radius:14px;font-size:14px;color:var(--ink);}
  .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:var(--muted);fill:none;stroke-width:2;}
  
  .builder-row{background:transparent;border-bottom:1px solid var(--line);padding:14px 22px;display:flex;align-items:center;gap:12px;width:100%;transition:background var(--dur-fast);}
  .builder-row.selected{background:#FF4D1F0d}
  .builder-body{flex:1;min-width:0;text-align:left;}
  .builder-name{font-size:15px;font-weight:700;margin-bottom:2px}
  .builder-meta{font-size:11px;color:var(--muted);font-weight:600}
  .builder-check{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(--dur-fast);}
  .builder-check svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:3;opacity:0;}
  .builder-row.selected .builder-check{background:var(--accent);border-color:var(--accent)}
  .builder-row.selected .builder-check svg{opacity:1}

  .builder-bar{position:absolute;left:0;right:0;bottom:0;background:var(--ink);color:var(--paper);padding:16px 22px;padding-bottom:calc(16px + var(--safe-bottom));display:flex;align-items:center;gap:12px;transform:translateY(100%);transition:transform var(--dur) var(--ease-out);z-index:5;}
  .builder-bar.show{transform:translateY(0)}

  .stagger > *{opacity:0;transform:translateY(8px);animation:stag .4s var(--ease-out) forwards}
  .stagger > *:nth-child(1){animation-delay:.04s}
  .stagger > *:nth-child(2){animation-delay:.08s}
  .stagger > *:nth-child(3){animation-delay:.12s}
  @keyframes stag{to{opacity:1;transform:translateY(0)}}
  
  .row{display:flex;align-items:center;gap:10px}
  .row-between{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .stack{display:flex;flex-direction:column;gap:10px}
  .mt-8{margin-top:8px} .mt-12{margin-top:12px} .mt-16{margin-top:16px} .mb-16{margin-bottom:16px}
  .text-center{text-align:center}
  .truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  
  /* 알림 점 */
  .badge-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 2px var(--paper);animation:pulse-dot 2s infinite;}
  @keyframes pulse-dot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.7}}
</style>
</head>
<body>

<div class="device-wrap">
  <div class="device">
    <div class="status-bar">
      <span id="clock">9:41</span>
      <div class="right">
        <span class="status-icon" aria-hidden="true"><svg viewBox="0 0 18 11"><path d="M1 7a8 8 0 0 1 16 0M3.5 9a5 5 0 0 1 11 0M6 11a2.5 2.5 0 0 1 6 0" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg></span>
        <span class="status-icon" aria-hidden="true"><svg viewBox="0 0 18 11"><path d="M1 9V6m4 3V3m4 6V1m4 8V4m4 5V2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></span>
        <span class="battery"><span class="fill"></span></span>
      </div>
    </div>

    <div class="app">
      <div class="stage" id="stage"></div>

      <nav class="tab-bar hidden" id="tabBar">
        <button class="tab" data-tab="home">
          <svg viewBox="0 0 24 24"><path d="M3 11l9-7 9 7v9a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2z"/></svg><span>홈</span>
        </button>
        <button class="tab" data-tab="teams">
          <svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.5"/><path d="M3 19c0-3 2.5-5 6-5s6 2 6 5M14 19c0-2 1.5-3.5 3.5-3.5S21 17 21 19"/></svg><span>팀</span>
        </button>
        <button class="tab center" data-tab="analyze">
          <span class="fab"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></span>
        </button>
        <button class="tab" data-tab="insights">
          <svg viewBox="0 0 24 24"><path d="M4 19V9m6 10V5m6 14v-7m6 7V11"/></svg><span>인사이트</span>
        </button>
        <button class="tab" data-tab="settings">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>설정</span>
        </button>
      </nav>
    </div>

    <div class="toast-area" id="toastArea"></div>
    <div class="scrim" id="scrim"></div>
    <div class="sheet" id="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-head" id="sheetHead"></div>
      <div class="sheet-body" id="sheetBody"></div>
    </div>
    <div class="dialog" id="dialog">
      <h3 id="dialogTitle"></h3>
      <p id="dialogBody"></p>
      <div class="actions">
        <button class="btn btn-secondary" id="dialogCancel">취소</button>
        <button class="btn btn-primary" id="dialogConfirm">확인</button>
      </div>
    </div>
    <div class="loader" id="loader"><div class="spin"></div></div>
  </div>
</div>

<script>
/* ===================================================================
   SERVICE WORKER (INLINE TRICK FOR OFFLINE SUPPORT)
   =================================================================== */
function registerInlineServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  // 단일 HTML 파일 유지를 위해 Blob 스크립트로 생성합니다.
  const swCode = `
    const CACHE_NAME = 'oneteam-cache-v1';
    self.addEventListener('install', event => {
      event.waitUntil(caches.open(CACHE_NAME).then(cache => {
        // 단일 페이지이므로 기본 루트를 캐싱합니다.
        return cache.addAll(['./']);
      }));
    });
    self.addEventListener('fetch', event => {
      event.respondWith(
        caches.match(event.request).then(response => response || fetch(event.request))
      );
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  
  window.addEventListener('load', () => {
    navigator.serviceWorker.register(swUrl)
      .then(reg => console.log('✅ 인라인 Service Worker 등록 완료 (오프라인 준비됨)'))
      .catch(err => console.warn('Service Worker 등록 실패:', err));
  });
}

/* ===================================================================
   ONE TEAM — LOGIC
   =================================================================== */
'use strict';

const STORAGE_KEY = 'oneteam:v2';
const APP_VERSION = '1.2.0'; // 고도화된 버전

const MBTI_TYPES = ['INTJ','INTP','ENTJ','ENTP','INFJ','INFP','ENFJ','ENFP','ISTJ','ISFJ','ESTJ','ESFJ','ISTP','ISFP','ESTP','ESFP'];
const MBTI_LABELS = { INTJ:'전략가', INTP:'논리술사', ENTJ:'통솔자', ENTP:'변론가', INFJ:'옹호자', INFP:'중재자', ENFJ:'선도자', ENFP:'활동가', ISTJ:'현실주의', ISFJ:'수호자', ESTJ:'경영자', ESFJ:'집정관', ISTP:'장인', ISFP:'모험가', ESTP:'사업가', ESFP:'연예인' };
const TRAITS = ['리더십','꼼꼼함','창의성','분석력','공감','실행력','협업','독립적','신중함','추진력','유연성','책임감'];
const BLOOD_TYPES = ['A','B','O','AB'];
const FAMILY_ROLES = ['첫째','중간','막내','외동'];
const AVATAR_PALETTE = ['#FF4D1F','#1B3A7A','#E8C547','#1F7A5A','#9B2D1F','#C76A1A','#5E4A8A','#2D6B7A'];

// Data Utilities
const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
const uid = (prefix='id') => `${prefix}_${Date.now().toString(36)}${Math.random().toString(36).slice(2,7)}`;
const hash = s => { let h=0; for(let i=0;i<s.length;i++){ h=((h<<5)-h)+s.charCodeAt(i); h|=0; } return Math.abs(h); };
const pickColor = seed => AVATAR_PALETTE[hash(String(seed))%AVATAR_PALETTE.length];
const initial = name => (name||'?').trim().charAt(0);
const clamp = (n,min,max) => Math.max(min, Math.min(max, n));

const DEFAULT_STATE = {
  settings: { theme: 'system', firstLaunch: true },
  profile: null,
  customMembers: [],
  teams: []
};

const Store = {
  state: structuredClone(DEFAULT_STATE),
  load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) this.state = { ...structuredClone(DEFAULT_STATE), ...JSON.parse(raw) };
    } catch(e){}
  },
  save(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(this.state)); }catch(e){} },
  pool(){ return [...this.state.customMembers]; }, // For simplicity in this merged code, pool only contains custom and profile.
  member(id){ return this.pool().find(m=>m.id===id) || (this.state.profile?.id === id ? this.state.profile : null); },
  team(id){ return this.state.teams.find(t=>t.id===id); },
};

/* ---------- Haptic Feedback ---------- */
const Haptic = {
  light(){ this._do(8); },
  medium(){ this._do(15); },
  success(){ this._do([0,15,40,15]); },
  _do(p){ try{ navigator.vibrate && navigator.vibrate(p); } catch(_){} }
};

/* ---------- Overlays ---------- */
const Toast = {
  show(message, kind='default', duration=2200){
    const el = document.createElement('div');
    el.className = `toast ${kind!=='default'?kind:''}`;
    el.textContent = message;
    $('#toastArea').appendChild(el);
    setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 220); }, duration);
  }
};

const Sheet = {
  open(title, bodyHTML, opts={}){
    $('#sheetHead').innerHTML = `<span class="sheet-title">${esc(title)}</span>`;
    $('#sheetBody').innerHTML = bodyHTML;
    $('#sheet').classList.add('open');
    $('#scrim').classList.add('open');
    if(opts.mount) opts.mount();
  },
  close(){ $('#sheet').classList.remove('open'); $('#scrim').classList.remove('open'); }
};

const Dialog = {
  open({title, body, confirmText='확인', cancelText='취소', danger=false, onConfirm}){
    $('#dialogTitle').textContent = title;
    $('#dialogBody').textContent = body || '';
    const confirmBtn = $('#dialogConfirm');
    confirmBtn.textContent = confirmText;
    confirmBtn.className = `btn ${danger?'btn-accent':'btn-primary'}`;
    confirmBtn.onclick = () => { this.close(); if(onConfirm) onConfirm(); };
    $('#dialogCancel').onclick = () => this.close();
    $('#dialog').classList.add('open'); $('#scrim').classList.add('open');
  },
  close(){ $('#dialog').classList.remove('open'); if(!$('#sheet').classList.contains('open')) $('#scrim').classList.remove('open'); }
};

const Loader = { show(){ $('#loader').classList.add('open'); }, hide(){ $('#loader').classList.remove('open'); } };

/* ---------- Routing ---------- */
const Router = {
  current: null,
  render(){
    const route = this.current;
    if(!route) return;
    const view = Views[route.name];
    const html = view(route.params || {});
    $('#stage').innerHTML = `<div class="screen fade-in">${html}</div>`;
    if(view.mount) view.mount(route.params || {});
    
    // Bottom Tab Handling
    const showTabs = ['home','teams','insights','settings'].includes(route.name);
    $('#tabBar').classList.toggle('hidden', !showTabs);
    $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === route.name));
  },
  go(name, params={}){ this.current = { name, params }; this.render(); }
};

const avatarHTML = (m, size='md') => `<div class="avatar avatar-${size}" style="background:${pickColor(m.id||m.name)}">${esc(initial(m.name))}</div>`;

/* ===================================================================
   VIEWS (Screens)
   =================================================================== */
const Views = {};

Views.splash = () => `
  <div class="splash">
    <div class="splash-logo"><span class="glyph"></span><span>One Team</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:28px">
      <div class="app-icon-lg"><svg viewBox="0 0 64 64" fill="none"><circle cx="24" cy="28" r="9" fill="#F4EFE6"/><circle cx="40" cy="28" r="9" fill="#F4EFE6" opacity="0.7"/><path d="M14 50c0-5.5 4.5-10 10-10s10 4.5 10 10M30 50c0-3.5 3-6.5 6.5-6.5S43 46.5 43 50" stroke="#F4EFE6" stroke-width="3" stroke-linecap="round"/></svg></div>
      <div class="splash-title" style="text-align:center">팀의 화학을<span class="line2">설계하다.</span></div>
    </div>
  </div>
`;
Views.splash.mount = () => { setTimeout(() => Router.go(Store.state.profile ? 'home' : 'analyze'), 1500); };

Views.home = () => {
  const p = Store.state.profile;
  const hero = p ? `
    <div class="hero-card">
      <div class="hero-row">
        ${avatarHTML(p, 'lg')}
        <div style="min-width:0;flex:1"><div class="hero-name truncate">${esc(p.name)}</div><div class="hero-sub">${esc(p.mbti)} · ${MBTI_LABELS[p.mbti]}</div></div>
      </div>
    </div>
  ` : '';
  
  return `
    <div class="app-header"><div class="left"><div class="splash-logo"><span class="glyph" style="width:24px;height:24px"></span><span style="letter-spacing:.16em;font-size:11px">One Team</span></div></div></div>
    <div class="scroll">
      ${hero}
      <div class="quick-actions">
        <button class="qa" data-go="analyze"><div class="qa-icon"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" fill="none" stroke-width="2"/></svg></div><div class="qa-title">프로필 분석</div><div class="qa-sub">나의 성향 재설정</div></button>
        <button class="qa" data-go="teamBuilder"><div class="qa-icon"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3" stroke="currentColor" fill="none" stroke-width="2"/><circle cx="17" cy="9" r="2.5" stroke="currentColor" fill="none" stroke-width="2"/><path d="M3 19c0-3 2.5-5 6-5s6 2 6 5" stroke="currentColor" fill="none" stroke-width="2"/></svg></div><div class="qa-title">팀 만들기</div><div class="qa-sub">팀원 조합 및 분석</div></button>
      </div>
      <div class="section">
        <div class="section-h"><span class="h3">최근 팀 목록</span><button class="link" data-tab="teams">전체 보기 →</button></div>
        <div class="stack stagger">
          ${Store.state.teams.slice(0,3).map(t => `<button class="team-card" data-team="${t.id}"><div class="team-card-name">${esc(t.name)}</div><div class="team-card-meta">${t.memberIds.length}명 팀원</div></button>`).join('') || '<div class="small" style="text-align:center;padding:20px;color:var(--muted)">저장된 팀이 없습니다.</div>'}
        </div>
      </div>
    </div>
  `;
};
Views.home.mount = () => {
  $$('[data-go]').forEach(b => b.addEventListener('click', () => { Haptic.light(); Router.go(b.dataset.go); }));
  $$('[data-tab]').forEach(b => b.addEventListener('click', () => { Haptic.light(); Router.go(b.dataset.tab); }));
  $$('[data-team]').forEach(b => b.addEventListener('click', () => { Haptic.light(); Toast.show('팀 메뉴 진입', 'success'); }));
};

/* ---------- WIZARD (Analyze) ---------- */
const WizState = { step: 0, data: {} };
Views.analyze = () => {
  WizState.data = Store.state.profile || { name:'', mbti:'' };
  return `
    <div class="app-header">
      <div class="left"><button class="h-back" data-back><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button><span class="h-title">간편 프로필 생성</span></div>
    </div>
    <div class="scroll no-tab" style="padding:24px 22px">
      <h2 class="wiz-q">당신의 <em>이름</em>과 <em>MBTI</em>를 알려주세요.</h2>
      <div class="stack mt-16">
        <div class="field"><label class="field-label">이름</label><input class="input" id="wizName" value="${esc(WizState.data.name)}" placeholder="홍길동"/></div>
        <div class="field"><label class="field-label">MBTI</label>
          <div class="mbti-grid">
            ${MBTI_TYPES.map(t => `<button type="button" class="mbti-chip ${WizState.data.mbti===t?'selected':''}" data-mbti="${t}">${t}</button>`).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="wiz-actions">
      <button class="btn btn-primary btn-block" id="wizSave">저장하기</button>
    </div>
  `;
};
Views.analyze.mount = () => {
  $('[data-back]').addEventListener('click', () => Router.go('home'));
  $$('[data-mbti]').forEach(b => b.addEventListener('click', () => {
    WizState.data.mbti = b.dataset.mbti;
    $$('[data-mbti]').forEach(x => x.classList.toggle('selected', x===b));
  }));
  $('#wizSave').addEventListener('click', () => {
    const name = $('#wizName').value.trim();
    if(!name || !WizState.data.mbti) { Toast.show('이름과 MBTI를 모두 입력해주세요.', 'error'); return; }
    Store.state.profile = { id: 'p_me', name, mbti: WizState.data.mbti, traits:['열정','협업'], age:30, blood:'A', familyRole:'첫째' };
    Store.save(); Haptic.success(); Toast.show('프로필이 저장되었습니다.', 'success');
    Router.go('home');
  });
};

/* ---------- TEAM BUILDER + CONTACT PICKER ---------- */
const BuilderState = { selected: new Set() };
Views.teamBuilder = () => {
  BuilderState.selected = new Set(Store.state.profile ? [Store.state.profile.id] : []);
  return `
    <div class="app-header">
      <div class="left"><button class="h-back" data-back><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button><span class="h-title">팀 만들기</span></div>
      <div class="right"><button class="h-action" id="builderAdd"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button></div>
    </div>
    <div class="scroll" id="builderList" style="padding-bottom:120px"></div>
    <div class="builder-bar show" id="builderBar">
      <div class="builder-bar-info"><div class="builder-bar-count" id="builderCount">0명 선택</div></div>
      <button class="btn btn-accent" id="builderSave">팀 저장 →</button>
    </div>
  `;
};
Views.teamBuilder.mount = () => {
  $('[data-back]').addEventListener('click', () => Router.go('home'));
  $('#builderAdd').addEventListener('click', openAddMemberSheet);
  $('#builderSave').addEventListener('click', () => {
    if(BuilderState.selected.size < 2) { Toast.show('최소 2명을 선택하세요.', 'error'); return; }
    const teamName = `새 팀 (${BuilderState.selected.size}명)`;
    Store.state.teams.push({ id: uid('t'), name: teamName, memberIds: Array.from(BuilderState.selected), createdAt: Date.now() });
    Store.save(); Haptic.success(); Toast.show('팀이 생성되었습니다.', 'success'); Router.go('home');
  });
  renderBuilderList();
};

function renderBuilderList() {
  const pool = [Store.state.profile, ...Store.state.customMembers].filter(Boolean);
  if(!pool.length) { $('#builderList').innerHTML = `<div class="empty">멤버가 없습니다.<br>우측 상단 + 로 추가하세요.</div>`; return; }
  
  $('#builderList').innerHTML = pool.map(m => {
    const sel = BuilderState.selected.has(m.id);
    return `
      <button class="builder-row ${sel?'selected':''}" data-pick="${m.id}">
        ${avatarHTML(m,'md')}
        <div class="builder-body"><div class="builder-name">${esc(m.name)}</div><div class="builder-meta">${esc(m.mbti)}</div></div>
        <div class="builder-check"><svg viewBox="0 0 24 24"><path d="M5 12l5 5L20 7" stroke-width="3" stroke="currentColor" fill="none"/></svg></div>
      </button>
    `;
  }).join('');
  
  $$('[data-pick]').forEach(b => b.addEventListener('click', () => {
    Haptic.light();
    const id = b.dataset.pick;
    BuilderState.selected.has(id) ? BuilderState.selected.delete(id) : BuilderState.selected.add(id);
    renderBuilderList();
  }));
  $('#builderCount').textContent = `${BuilderState.selected.size}명 선택`;
}

/* ===================================================================
   CONTACT PICKER API INTEGRATION (모바일 앱 경험 극대화)
   =================================================================== */
function openAddMemberSheet(){
  Sheet.open('새 멤버 추가', `
    <div class="stack">
      <button class="btn btn-secondary btn-block mb-16" id="cmImportContact" style="display:flex; justify-content:center; align-items:center;">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2" style="margin-right:8px"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        기기 주소록에서 불러오기
      </button>
      
      <div class="field"><label class="field-label">이름</label><input class="input" id="cmName" placeholder="홍길동"/></div>
      <div class="field"><label class="field-label">MBTI</label>
        <div class="mbti-grid" id="cmMbti">
          ${['ENFP','ENTJ','INFP','INTJ','ESFJ','ESTP','ISFJ','ISTP'].map(t => `<button type="button" class="mbti-chip" data-m="${t}">${t}</button>`).join('')}
        </div>
      </div>
      <button class="btn btn-primary btn-block mt-8" id="cmSave">팀에 추가</button>
    </div>
  `, {
    mount: () => {
      let selectedMbti = '';
      $$('[data-m]').forEach(b => b.addEventListener('click', () => {
        selectedMbti = b.dataset.m;
        $$('[data-m]').forEach(x => x.classList.toggle('selected', x===b));
      }));
      
      // 주소록 API 이벤트 바인딩
      $('#cmImportContact').addEventListener('click', async () => {
        Haptic.medium();
        const supported = ('contacts' in navigator && 'ContactsManager' in window);
        if (!supported) {
          Toast.show('주소록 연동을 지원하지 않는 환경입니다.', 'error');
          return;
        }
        try {
          const contacts = await navigator.contacts.select(['name'], { multiple: false });
          if (contacts.length > 0 && contacts[0].name.length > 0) {
            $('#cmName').value = contacts[0].name[0];
            Toast.show(`${contacts[0].name[0]}님을 불러왔습니다.`, 'success');
          }
        } catch (err) {
          console.warn('주소록 접근 에러/취소', err);
        }
      });

      $('#cmSave').addEventListener('click', () => {
        const name = $('#cmName').value.trim();
        if(!name || !selectedMbti) { Toast.show('모두 입력해주세요.', 'error'); return; }
        const newId = uid('cm');
        Store.state.customMembers.push({ id: newId, name, mbti: selectedMbti });
        Store.save(); Sheet.close(); Toast.show('추가 완료', 'success');
        BuilderState.selected.add(newId);
        renderBuilderList();
      });
    }
  });
}

/* ---------- Global Initialization ---------- */
function bindGlobalEvents() {
  $$('.tab').forEach(t => t.addEventListener('click', () => { Haptic.light(); Router.go(t.dataset.tab); }));
  $('#scrim').addEventListener('click', () => { if($('#sheet').classList.contains('open')) Sheet.close(); else Dialog.close(); });
  
  const updateClock = () => {
    const d = new Date(), h = d.getHours(), m = d.getMinutes();
    $('#clock').textContent = `${h}:${String(m).padStart(2,'0')}`;
  };
  updateClock(); setInterval(updateClock, 30000);
}

function boot() {
  registerInlineServiceWorker(); // 오프라인 PWA 구동
  Store.load();
  bindGlobalEvents();
  Router.go('splash');
}

document.addEventListener('DOMContentLoaded', boot);
</script>
