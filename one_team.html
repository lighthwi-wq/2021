<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" id="meta-theme">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="One Team">
<title>One Team — AI 팀원 매시업</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  /* ============ TOKENS & RESET (MZ VIBE) ============ */
  :root{
    --ink:#0A0A0A; --ink-2:#1F1F1F; --paper:#F7F5F0; --paper-2:#EFEBE1; --paper-3:#E5DCC9;
    --line:#0a0a0a14; --line-2:#0a0a0a26; --muted:#6B6258; --muted-2:#9A9088;
    --accent:#FF3300; --accent-2:#4A154B; --accent-3:#DFFF00;
    --good:#00C853; --bad:#FF1744; --warn:#FF9100; --card:#FFFFFF; --card-2:#FAF6EC;
    --ai-grad: linear-gradient(135deg, #FF3300 0%, #FF007F 50%, #7000FF 100%);
    --mesh-bg: radial-gradient(at 0% 0%, hsla(13,100%,60%,0.15) 0px, transparent 50%),
               radial-gradient(at 100% 100%, hsla(271,100%,60%,0.15) 0px, transparent 50%);
    --overlay:rgba(10,10,10,.6); --sheet-bg:rgba(255,255,255,0.85);
    --shadow-sm:0 4px 16px -4px rgba(10,10,10,.08); --shadow-lg:0 32px 64px -16px rgba(10,10,10,.25);
    --radius-lg:28px; --dur-fast:160ms; --dur:280ms; --dur-slow:480ms; 
    --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.15); /* 쫀득한 텐션 */
    --ease: cubic-bezier(0.25, 1, 0.5, 1);
    --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  [data-theme="dark"]{
    --ink:#FFFFFF; --ink-2:#E5DCC9; --paper:#09090B; --paper-2:#18181B; --paper-3:#27272A;
    --line:#ffffff1c; --line-2:#ffffff36; --muted:#A1A1AA; --muted-2:#71717A;
    --card:#18181B; --card-2:#27272A; --overlay:rgba(0,0,0,.8); --sheet-bg:rgba(24,24,27,0.85);
    --mesh-bg: radial-gradient(at 0% 0%, hsla(13,100%,50%,0.2) 0px, transparent 50%),
               radial-gradient(at 100% 100%, hsla(271,100%,50%,0.2) 0px, transparent 50%);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#0a0a0a;font-family:'Pretendard',system-ui,sans-serif;color:var(--ink); letter-spacing:-0.01em;}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;outline:none;}
  input, select{font:inherit;color:inherit;outline:none;}
  ::-webkit-scrollbar{display:none;}

  /* ============ DEVICE & LAYOUT ============ */
  .device-wrap{height:100%;width:100%;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at top,#1c1816,#0a0a0a 70%);padding:24px;}
  .device{width:100%;max-width:420px;height:100%;max-height:920px;background:var(--paper);border-radius:48px;overflow:hidden;position:relative;box-shadow:0 40px 100px -20px rgba(0,0,0,.8), 0 0 0 8px #000, 0 0 0 10px #2a2a2a;display:flex;flex-direction:column;}
  @media (max-width:520px){ .device-wrap{padding:0;background:var(--paper)} .device{max-width:100%;max-height:100%;border-radius:0;box-shadow:none} }
  
  .app{flex:1;display:flex;flex-direction:column;position:relative;background:var(--paper);background-image:var(--mesh-bg);overflow:hidden;}
  .stage{flex:1;position:relative;overflow:hidden}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;background:transparent;overflow:hidden;transform:translateX(0);transition:transform var(--dur) var(--ease), opacity var(--dur) var(--ease);}
  .screen.fade-in{animation:springIn var(--dur-slow) var(--ease-spring)}
  @keyframes springIn{from{opacity:0; transform:translateY(20px) scale(0.98)}to{opacity:1; transform:translateY(0) scale(1)}}
  
  .app-header{flex-shrink:0;padding:calc(10px + var(--safe-top)) 22px 10px;display:flex;align-items:center;justify-content:space-between;min-height:calc(56px + var(--safe-top)); z-index:10; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);}
  .app-header .left{display:flex;align-items:center;gap:12px;flex:1}
  .h-title{font-size:18px;font-weight:800;letter-spacing:-.03em;}
  .h-action, .h-back{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:transform .2s, background .2s; margin-left:-8px; background:var(--card); box-shadow:var(--shadow-sm);}
  .h-action:active, .h-back:active{transform:scale(0.9);}
  .scroll{flex:1;overflow-y:auto;padding-bottom:calc(96px + var(--safe-bottom));}
  .scroll.no-tab{padding-bottom:calc(30px + var(--safe-bottom))}

  /* ============ GLASS BOTTOM NAV ============ */
  .tab-bar{
    position:absolute;left:16px;right:16px;bottom:calc(16px + var(--safe-bottom)); height:68px;
    background:color-mix(in srgb, var(--card) 80%, transparent); backdrop-filter:blur(24px) saturate(180%); -webkit-backdrop-filter:blur(24px) saturate(180%);
    border-radius:34px; box-shadow:0 8px 32px rgba(0,0,0,0.1); border:1px solid var(--line);
    display:flex; z-index:10; transition:transform .4s var(--ease-spring);
  }
  .tab-bar.hidden{transform:translateY(150%)}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--muted);font-size:11px;font-weight:700; transition:color .2s;}
  .tab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round; transition:transform .2s var(--ease-spring);}
  .tab.active{color:var(--ink)} .tab.active svg{transform:translateY(-2px)}
  .tab .fab{width:56px;height:56px;border-radius:50%;background:var(--ai-grad);color:#fff;display:grid;place-items:center;margin-top:-28px;box-shadow:0 8px 24px rgba(255,51,0,0.4);transition:transform .2s var(--ease-spring);}
  .tab:active .fab{transform:scale(.9) rotate(15deg);}

  /* ============ UTILITIES & COMPONENTS ============ */
  .stack { display:flex; flex-direction:column; gap:16px; }
  .mt-8 { margin-top:8px; } .mt-16 { margin-top:16px; } .mb-24 { margin-bottom:24px; }
  .h3 { font-size:20px; font-weight:800; letter-spacing:-0.03em;}
  .link { font-size:14px; font-weight:700; color:var(--muted); text-decoration:none; display:inline-flex; align-items:center; gap:4px;}
  .truncate { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:56px;padding:0 28px;border-radius:20px;font-size:16px;font-weight:800;transition:transform .2s var(--ease-spring), opacity .2s; cursor:pointer;}
  .btn:active{transform:scale(.94)} 
  .btn-primary{background:var(--ink);color:var(--paper)} 
  .btn-secondary{background:var(--line);color:var(--ink)}
  .btn-ai{background:var(--ai-grad);color:#fff; box-shadow: 0 8px 24px rgba(255, 51, 0, 0.3); position:relative; overflow:hidden;}
  .btn-ai::after { content:''; position:absolute; inset:0; background:linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transform:translateX(-100%); animation:shimmer 2s infinite; }
  .btn-block{width:100%} 
  @keyframes shimmer { 100% { transform:translateX(100%); } }
  
  .card{background:var(--card);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-sm); border:1px solid var(--line); position:relative; overflow:hidden;}
  .avatar{border-radius:18px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0; font-family:system-ui;}
  .avatar-md{width:56px;height:56px;font-size:24px; box-shadow:inset 0 -2px 0 rgba(0,0,0,0.2);} 
  .chip{display:inline-flex;align-items:center;padding:6px 14px;border-radius:99px;font-size:13px;font-weight:700;background:var(--line);color:var(--ink);}
  .chip-good{background:#00C8531f;color:var(--good)} .chip-warn{background:#FF91001f;color:var(--warn)} 
  .chip-ai{background:var(--ai-grad);color:#fff;border:none; animation: pulseGlow 2s infinite;}
  @keyframes pulseGlow { 0%,100%{box-shadow:0 0 0 0 rgba(255,51,0,0.4)} 50%{box-shadow:0 0 0 6px rgba(255,51,0,0)} }
  
  .section{padding:0 22px;margin-bottom:32px} .section-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}

  /* ============ WIZARD & FORMS ============ */
  .wiz-q{font-size:28px;font-weight:800;line-height:1.3; letter-spacing:-0.04em;}
  .wiz-q em{font-style:normal;background:var(--ai-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .wiz-actions{position:absolute;bottom:0;left:0;right:0;padding:16px 22px calc(16px + var(--safe-bottom));background:linear-gradient(transparent, var(--paper) 30%);}
  
  .field{display:flex;flex-direction:column;gap:10px;}
  .field-label{font-size:14px;font-weight:800;color:var(--muted);}
  .input{height:56px;background:var(--card);border:2px solid transparent;border-radius:18px;padding:0 20px;font-size:16px;font-weight:700;transition:all .2s;color:var(--ink);width:100%; box-shadow:var(--shadow-sm);}
  .input:focus{border-color:var(--accent); background:var(--card); transform:translateY(-2px); box-shadow:var(--shadow-lg);}
  
  .mbti-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
  .mbti-chip{height:48px;display:flex;align-items:center;justify-content:center;background:var(--card);border:2px solid transparent;border-radius:16px;font-size:15px;font-weight:800;transition:all .2s var(--ease-spring); box-shadow:var(--shadow-sm); color:var(--muted-2);}
  .mbti-chip.selected{background:var(--ink);color:var(--paper); transform:scale(1.05); box-shadow:0 8px 16px rgba(0,0,0,0.2);}

  /* ============ TEAMS & MATCH ============ */
  .team-card{background:var(--card);border-radius:24px;padding:22px;width:100%;text-align:left;box-shadow:var(--shadow-sm);margin-bottom:16px;transition:transform .2s var(--ease-spring), box-shadow .2s; border:1px solid var(--line);}
  .team-card:active{transform:scale(.96); box-shadow:none;}
  .team-card-name{font-size:18px;font-weight:800;margin-bottom:6px; display:flex; justify-content:space-between; align-items:center;}
  .team-card-meta{font-size:14px;color:var(--muted);font-weight:600}
  
  .team-avatars{display:flex;margin-top:20px; padding-left:8px;}
  .team-avatars .avatar{width:40px;height:40px;font-size:16px;border-radius:14px;border:3px solid var(--card);margin-left:-12px; transition:transform .2s;}
  .team-card:hover .team-avatars .avatar{transform:translateX(4px);}

  /* ============ TEAM BUILDER ============ */
  .builder-row{display:flex;align-items:center;gap:16px;padding:16px 22px;width:100%;text-align:left;background:transparent;transition:background .2s, transform .2s;}
  .builder-row:active{background:var(--line); transform:scale(0.98);}
  .builder-body{flex:1;}
  .builder-name{font-size:17px;font-weight:800;}
  .builder-meta{font-size:14px;color:var(--muted);font-weight:600;margin-top:4px;}
  
  .check-ring{width:28px;height:28px;border-radius:50%;border:2px solid var(--line-2);display:flex;align-items:center;justify-content:center;color:transparent;transition:all .3s var(--ease-spring);}
  .builder-row.selected .check-ring{background:var(--ink);border-color:var(--ink);color:var(--paper); transform:scale(1.1);}
  .builder-row.ai-recommended .builder-name::after { content: '✨ AI 픽'; font-size: 11px; background: var(--ai-grad); color: white; padding: 3px 8px; border-radius: 12px; margin-left: 8px; vertical-align: middle; box-shadow:0 2px 8px rgba(255,51,0,0.3);}
  
  .builder-bar{position:absolute;bottom:0;left:0;right:0;padding:20px 22px calc(20px + var(--safe-bottom));background:var(--sheet-bg); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border-top:1px solid var(--line); display:flex;justify-content:space-between;align-items:center;transform:translateY(100%);transition:transform .4s var(--ease-spring);z-index:20;}
  .builder-bar.show{transform:translateY(0);}

  /* ============ INSIGHTS (HOLO CARD & RADAR) ============ */
  .holo-card{ background:var(--ink); color:white; border-radius:32px; padding:32px 24px; position:relative; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.4); text-align:center;}
  .holo-card::before{ content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:conic-gradient(from 0deg, transparent, var(--accent), var(--accent-2), transparent); animation:spinHolo 4s linear infinite; opacity:0.15; pointer-events:none;}
  @keyframes spinHolo{ 100%{transform:rotate(360deg)} }

  .radar-wrap{position:relative;width:100%;max-width:260px;margin:24px auto;aspect-ratio:1; filter:drop-shadow(0 10px 20px rgba(255,51,0,0.2));}
  .radar svg{width:100%;height:100%;overflow:visible}
  .radar .grid{fill:none;stroke:rgba(255,255,255,0.1);stroke-width:1}
  .radar .axis{stroke:rgba(255,255,255,0.1);stroke-width:1}
  .radar .area{fill:url(#radarGrad); fill-opacity:0.6; stroke:#FF3300; stroke-width:3; stroke-linejoin:round; filter:drop-shadow(0 0 10px #FF3300);}
  .radar .point{fill:#fff;stroke:#FF3300;stroke-width:3}
  .radar .label{font-size:12px;font-weight:800;fill:rgba(255,255,255,0.8)}

  .insight-list { display:flex; flex-direction:column; gap:16px; margin-top:24px; }
  .insight-item { background:var(--card); border-radius:20px; padding:20px; box-shadow:var(--shadow-sm); display:flex; gap:16px; border:1px solid var(--line);}
  .insight-icon { width:48px; height:48px; border-radius:16px; background:var(--paper-2); display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0;}
  .insight-text { flex:1; }
  .insight-title { font-size:16px; font-weight:800; margin-bottom:6px; color:var(--ink);}
  .insight-desc { font-size:14px; color:var(--muted); line-height:1.5; word-break:keep-all;}
  .insight-item.ai-focus { border:2px solid transparent; background:linear-gradient(var(--card),var(--card)) padding-box, var(--ai-grad) border-box; }
  .insight-item.ai-focus .insight-icon { background:var(--ai-grad); color:white; }

  /* ============ OVERLAYS & ANIMATIONS ============ */
  .scrim{position:absolute;inset:0;background:var(--overlay); backdrop-filter:blur(4px); z-index:100;opacity:0;pointer-events:none;transition:opacity .3s;}
  .scrim.open{opacity:1;pointer-events:auto}
  
  .sheet{position:absolute;left:8px;right:8px;bottom:calc(8px + var(--safe-bottom));background:var(--sheet-bg); backdrop-filter:blur(30px) saturate(200%); -webkit-backdrop-filter:blur(30px) saturate(200%); border-radius:32px;z-index:110;transform:translateY(120%);transition:transform .4s var(--ease-spring);display:flex;flex-direction:column; box-shadow:var(--shadow-lg); border:1px solid var(--line);}
  .sheet.open{transform:translateY(0)}
  .sheet-handle{width:48px;height:6px;background:var(--line-2);border-radius:99px;margin:16px auto 12px;}
  .sheet-head{padding:0 24px 16px;font-size:20px;font-weight:800; text-align:center;}
  .sheet-body{padding:0 24px 24px;overflow-y:auto;max-height:70vh;}
  
  .toast-area{position:absolute;top:calc(16px + var(--safe-top));left:16px;right:16px;z-index:200;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
  .toast{background:var(--ink);color:var(--paper);padding:16px 24px;border-radius:99px;font-size:15px;font-weight:800;box-shadow:0 12px 24px rgba(0,0,0,0.2);animation:toastIn .4s var(--ease-spring);pointer-events:auto; display:flex; align-items:center; gap:8px;}
  .toast.success{background:var(--good);color:#fff} .toast.error{background:var(--bad);color:#fff}
  .toast.out{animation:toastOut .3s forwards;}
  @keyframes toastIn{from{transform:translateY(-40px) scale(0.9);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
  @keyframes toastOut{from{transform:translateY(0);opacity:1}to{transform:translateY(-20px);opacity:0}}
  
  .typing-effect { display:inline-block; overflow:hidden; white-space:nowrap; border-right:2px solid var(--accent); animation: typing 1.5s steps(20, end), blink-caret .75s step-end infinite; }
  @keyframes typing { from { width: 0 } to { width: 100% } }
  @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--accent); } }

</style>
</head>
<body>

<svg style="width:0;height:0;position:absolute;" aria-hidden="true">
  <defs>
    <linearGradient id="radarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3300" />
      <stop offset="100%" stop-color="#7000FF" />
    </linearGradient>
  </defs>
</svg>

<div class="device-wrap">
  <div class="device">
    <div class="app">
      <div class="stage" id="stage"></div>
      <nav class="tab-bar hidden" id="tabBar">
        <button class="tab" data-tab="home"><svg viewBox="0 0 24 24"><path d="M3 11l9-7 9 7v9a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2z"/></svg><span>홈</span></button>
        <button class="tab" data-tab="teams"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.5"/><path d="M3 19c0-3 2.5-5 6-5s6 2 6 5M14 19c0-2 1.5-3.5 3.5-3.5S21 17 21 19"/></svg><span>스쿼드</span></button>
        <button class="tab center" data-tab="teamBuilder"><span class="fab"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" fill="none" stroke-width="2.5"/></svg></span></button>
        <button class="tab" data-tab="settings"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg><span>실험실</span></button>
      </nav>
    </div>
    <div class="toast-area" id="toastArea"></div>
    <div class="scrim" id="scrim"></div>
    <div class="sheet" id="sheet"><div class="sheet-handle"></div><div class="sheet-head" id="sheetHead"></div><div class="sheet-body" id="sheetBody"></div></div>
  </div>
</div>

<script>
'use strict';

const STORAGE_KEY = 'oneteam_db_mz_v1';
const MBTI_TYPES = ['INTJ','INTP','ENTJ','ENTP','INFJ','INFP','ENFJ','ENFP','ISTJ','ISFJ','ESTJ','ESFJ','ISTP','ISFP','ESTP','ESFP'];
const MBTI_LABELS = { INTJ:'갓벽주의 전략가', INTP:'방구석 아인슈타인', ENTJ:'도파민 폭주 기관차', ENTP:'팩폭 장인', INFJ:'겉바속촉 예언자', INFP:'망상 풀가동 요정', ENFJ:'인간 리트리버', ENFP:'인싸 중의 인싸', ISTJ:'엑셀 인간화', ISFJ:'프로수발러', ESTJ:'효율 집착 광공', ESFJ:'핵인싸 총무', ISTP:'효율 낭만파', ISFP:'누워있는 예술가', ESTP:'브레이크 고장', ESFP:'인간 핫식스' };
const AVATAR_PALETTE = ['#FF3300','#4A154B','#00C853','#FF007F','#7000FF','#FF9100','#00B0FF','#1A1A1A'];

const $ = (sel, root=document) => root.querySelector(sel);
const $$ = (sel, root=document) => Array.from(root.querySelectorAll(sel));
const esc = s => String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
const uid = (prefix='id') => `${prefix}_${Date.now().toString(36)}${Math.random().toString(36).slice(2,7)}`;
const hash = s => { let h=0; for(let i=0;i<s.length;i++){ h=((h<<5)-h)+s.charCodeAt(i); h|=0; } return Math.abs(h); };
const pickColor = seed => AVATAR_PALETTE[hash(String(seed))%AVATAR_PALETTE.length];
const initial = name => (name||'?').trim().charAt(0);
const clamp = (n,min,max) => Math.max(min, Math.min(max, n));

const DEFAULT_STATE = { settings: { theme: 'system' }, profile: null, customMembers: [], teams: [] };
const deepClone = obj => JSON.parse(JSON.stringify(obj));

const Store = {
  state: deepClone(DEFAULT_STATE),
  load(){ try { const raw = localStorage.getItem(STORAGE_KEY); if(raw) this.state = { ...deepClone(DEFAULT_STATE), ...JSON.parse(raw) }; } catch(e){} },
  save(){ try { localStorage.setItem(STORAGE_KEY, JSON.stringify(this.state)); } catch(e){} },
  pool(){ return [...(this.state.customMembers || [])]; },
  member(id){ if(this.state.profile && this.state.profile.id === id) return this.state.profile; return this.pool().find(m => m && m.id === id); },
  team(id){ return (this.state.teams || []).find(t => t.id === id); },
};

const Haptic = { 
  light(){ this._do(10); }, 
  success(){ this._do([10,30,50]); }, 
  heavy(){ this._do(40); },
  _do(p){ try{ navigator.vibrate && navigator.vibrate(p); } catch(_){} } 
};

const Toast = {
  show(msg, icon='✨', dur=2500){
    const el = document.createElement('div'); el.className = `toast`; 
    el.innerHTML = `<span>${icon}</span> <span>${msg}</span>`;
    $('#toastArea').appendChild(el); Haptic.light();
    setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, dur);
  }
};

const Sheet = {

/* ===================================================================
   MZ VIBE AI ENGINE
   =================================================================== */
const AIEngine = {
  evaluateInteraction(m1, m2) {
    if(!m1 || !m2) return 0;
    let score = 0;
    if (m1[1] !== m2[1]) score += 15; 
    if (m1[3] !== m2[3]) score += 10;
    if (m1 === m2) score -= 10;
    return score;
  },
  
  analyze(memberIds) {
    const members = memberIds.map(id => Store.member(id)).filter(Boolean);
    if(!members.length) return { scores:{leadership:0, execution:0, creativity:0, analysis:0, empathy:0}, overall:0, insights:[] };

    let s = { leadership:0, execution:0, creativity:0, analysis:0, empathy:0 };
    let roles = { planner: 0, executor: 0, mediator: 0, analyst: 0 };
    
    members.forEach(m => {
      if(m.mbti){
        if(m.mbti[0]==='E') s.leadership+=15; else s.analysis+=5;
        if(m.mbti[1]==='S') { s.execution+=20; roles.executor++; } else { s.creativity+=20; roles.planner++; }
        if(m.mbti[2]==='T') { s.analysis+=20; roles.analyst++; } else { s.empathy+=20; roles.mediator++; }
        if(m.mbti[3]==='J') { s.execution+=10; s.leadership+=5; } else { s.creativity+=5; }
      }
    });

    let synergyBonus = 0;
    for (let i = 0; i < members.length; i++) {
      for (let j = i + 1; j < members.length; j++) { synergyBonus += this.evaluateInteraction(members[i].mbti, members[j].mbti); }
    }
    
    const maxPer = Math.max(members.length * 30, 100);
    Object.keys(s).forEach(k => s[k] = clamp(Math.round(((s[k] + (synergyBonus/(members.length||1)))) / maxPer * 100), 20, 100));
    
    const overall = Math.round((s.leadership + s.execution + s.creativity + s.analysis + s.empathy) / 5);
    const insights = [];
    
    // MZ Style Copywriting
    if(roles.planner > 0 && roles.executor === 0) insights.push({ i:'🚨', t:'몽상가들의 파티 (실행력 떡락 주의)', d:'아이디어는 넷플릭스급인데, 막상 코딩할 사람이 없습니다. J나 S 성향의 멱살잡이 1명이 시급합니다.', type:'warn' });
    else if(roles.planner > 0 && roles.executor > 0) insights.push({ i:'🚀', t:'티키타카 오지는 릴레이', d:'N의 미친 발상을 S가 묵묵히 현실로 깎아내는 갓벽한 업무 파이프라인입니다.', type:'ai' });
    
    if(roles.analyst > (members.length/2)) insights.push({ i:'🧊', t:'T발 C야? 얼음송곳 팀', d:'효율과 논리가 지배하는 차가운 공간. 목표 달성은 빠르겠지만, 멘탈 나가는 팀원이 생길 수 있으니 칭찬을 의식적으로 해주세요.', type:'warn' });
    if(roles.mediator > (members.length/2)) insights.push({ i:'💖', t:'F들의 힐링 캠프', d:'서로 상처받을까봐 피드백을 못할 수도 있습니다. 일할 땐 조금 더 매운맛이 필요합니다.', type:'warn' });
    
    if(synergyBonus > 20) insights.push({ i:'🔥', t:'우주 최강 도파민 파티', d:'성향이 서로의 단점을 미친듯이 보완해줍니다. 케미스트리 폭발, 팀워크 1티어 조합입니다.', type:'ai' });
    else if(insights.length === 0) insights.push({ i:'⚖️', t:'육각형 안정형 팟', d:'모난 곳 없이 밸런스가 좋습니다. 무난하게 프로젝트를 폭파시킬 수 있는 든든한 조합.', type:'ai' });

    let title = "평범한 스쿼드";
    if(overall > 85) title = "S급 전설의 레전드 스쿼드 👑";
    else if(overall > 70) title = "포텐 터지는 시너지 스쿼드 ⚡";

    return { scores:s, overall, insights, count:members.length, title };
  },

  recommend(selectedIds, pool) {
    if(selectedIds.length === 0 || pool.length === 0) return [];
    const current = this.analyze(selectedIds);
    let best = null, maxGain = 0;
    
    pool.filter(p => !selectedIds.includes(p.id)).forEach(c => {
      const sim = this.analyze([...selectedIds, c.id]);
      const gain = sim.overall - current.overall;
      if (gain > maxGain) { maxGain = gain; best = c.id; }
    });
    return best ? [best] : [];
  }
};

/* --- CHART RENDERER --- */
function renderRadarChart(data){
  const size = 260, cx = size/2, cy = size/2, r = 90;
  const angleAt = i => -Math.PI/2 + (i * 2*Math.PI/5);
  const pt = (i, val) => [cx + r*(val/100)*Math.cos(angleAt(i)), cy + r*(val/100)*Math.sin(angleAt(i))];
  const rings = [0.25, 0.5, 0.75, 1].map(k => `<polygon class="grid" points="${[0,1,2,3,4].map(i => `${cx + r*k*Math.cos(angleAt(i))},${cy + r*k*Math.sin(angleAt(i))}`).join(' ')}"/>`).join('');
  const axes = [0,1,2,3,4].map(i => `<line class="axis" x1="${cx}" y1="${cy}" x2="${pt(i,100)[0]}" y2="${pt(i,100)[1]}"/>`).join('');
  const dataPts = data.map((d,i) => pt(i, d.value).join(',')).join(' ');
  const points = data.map((d,i) => `<circle class="point" cx="${pt(i, d.value)[0]}" cy="${pt(i, d.value)[1]}" r="5"/>`).join('');
  const labels = data.map((d,i) => {
    const [x,y] = [cx + (r+28)*Math.cos(angleAt(i)), cy + (r+28)*Math.sin(angleAt(i))];
    const anchor = Math.abs(x-cx)<10 ? 'middle' : x>cx ? 'start' : 'end';
    return `<text class="label" x="${x}" y="${y}" text-anchor="${anchor}" dominant-baseline="middle">${d.label}</text>`;
  }).join('');
  return `<div class="radar-wrap"><div class="radar"><svg viewBox="0 0 ${size} ${size}">${rings}${axes}<polygon class="area" points="${dataPts}"/>${points}${labels}</svg></div></div>`;
}

Views.analyze = () => {
  WizState.data = Store.state.profile || { name:'', mbti:'' };
  const isFirstTime = !Store.state.profile;
  const backBtnHtml = isFirstTime ? `<div></div>` : `<button class="h-back" onclick="Router.go('home')"><svg viewBox="0 0 24 24" width="24" stroke="currentColor" fill="none" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>`;
  return `
    <div class="app-header"><div class="left">${backBtnHtml}</div></div>
    <div class="scroll no-tab" style="padding:16px 24px">
      <h2 class="wiz-q">당신의 <em>업무 DNA</em>를<br/>알려주세요.</h2>
      <p style="color:var(--muted); font-size:15px; font-weight:600; margin-top:12px;">AI가 당신과 가장 잘 맞는 스쿼드를 짜드릴게요.</p>
      
      <div class="stack" style="margin-top: 40px; padding-bottom: 80px;">
        <div class="field"><label class="field-label">호칭</label><input class="input" id="wizName" value="${esc(WizState.data.name)}" placeholder="이름 또는 닉네임"/></div>
        <div class="field mt-16"><label class="field-label">MBTI</label><div class="mbti-grid">${MBTI_TYPES.map(t => `<button type="button" class="mbti-chip ${WizState.data.mbti===t?'selected':''}" data-wmbti="${t}">${t}</button>`).join('')}</div></div>
      </div>
    </div>
    <div class="wiz-actions"><button class="btn btn-ai btn-block" id="wizSave" style="height:64px; border-radius:24px; font-size:18px;">${isFirstTime ? '시작하기 🚀' : '업데이트'}</button></div>
  `;
};
Views.analyze.mount = () => {
  $$('[data-wmbti]').forEach(b => b.addEventListener('click', () => { Haptic.light(); WizState.data.mbti = b.dataset.wmbti; $$('[data-wmbti]').forEach(x => x.classList.toggle('selected', x===b)); }));
  $('#wizSave').addEventListener('click', () => {
    const name = $('#wizName').value.trim();
    if(!name || !WizState.data.mbti) return Toast.show('모든 항목을 픽해주세요!', '🚨');
    Store.state.profile = { id: 'p_me', name, mbti: WizState.data.mbti };
    Store.save(); Haptic.success(); Router.go('home');
  });
};

/* --- SETTINGS --- */
Views.settings = () => `
  <div class="app-header"><div class="left"><span class="h-title">실험실</span></div></div>
  <div class="scroll" style="padding:16px 22px;">
    <div class="card" style="padding:16px; display:flex; flex-direction:column; gap:8px;">
      <div style="font-size:14px;font-weight:800;color:var(--muted);margin-bottom:8px;">UI 테마 모드</div>
      <div style="display:flex;gap:8px; background:var(--card-2); padding:6px; border-radius:18px;">
        ${['light','dark','system'].map(t => `<button class="theme-opt ${Store.state.settings.theme===t?'active':''}" data-theme="${t}" style="flex:1; padding:12px; border-radius:14px; font-weight:800; font-size:14px; transition:all .2s; background:${Store.state.settings.theme===t?'var(--ink)':'transparent'}; color:${Store.state.settings.theme===t?'var(--paper)':'var(--muted)'};">${t==='light'?'☀️ 라이트':t==='dark'?'🌙 다크':'⚙️ 시스템'}</button>`).join('')}
      </div>
    </div>
    
    <div class="mt-16">
      <button class="btn btn-block" id="btnReset" style="background:#FF17441f; color:var(--bad); height:60px;">데이터 전체 초기화 💣</button>
    </div>
  </div>
`;
Views.settings.mount = () => {
  $$('[data-theme]').forEach(b => b.addEventListener('click', () => { 
    Haptic.light(); Store.state.settings.theme = b.dataset.theme; Store.save(); applyTheme(); 
    $$('[data-theme]').forEach(x => { x.style.background='transparent'; x.style.color='var(--muted)'; });
    b.style.background='var(--ink)'; b.style.color='var(--paper)';
  }));
  $('#btnReset').addEventListener('click', () => { 
    Sheet.open('정말 초기화할까요?', '<div class="stack"><p style="color:var(--muted); font-size:15px; font-weight:600; text-align:center;">저장된 프로필과 팀 데이터가 모두 날아갑니다.</p><button class="btn btn-block" style="background:var(--bad); color:#fff; height:60px;" id="btnConfirmReset">네, 폭파시킬게요 💣</button></div>', {
      mount: () => { $('#btnConfirmReset').onclick = () => { Store.state = deepClone(DEFAULT_STATE); Store.save(); applyTheme(); Sheet.close(); Router.go('splash'); }; }
    });
  });
};

function applyTheme() {
  let t = Store.state.settings.theme || 'system'; if(t === 'system') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', t);
  const metaTheme = $('#meta-theme'); if(metaTheme) metaTheme.setAttribute('content', t === 'dark' ? '#09090B' : '#0a0a0a');
}
function boot(){
  Store.load(); applyTheme();
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if(Store.state.settings.theme === 'system') applyTheme(); });
  $('#scrim').addEventListener('click', () => { if($('#sheet').classList.contains('open')) Sheet.close(); });
  Router.go('splash');
}
document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
