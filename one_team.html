<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" id="meta-theme">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="One Team">
<title>One Team — 팀원 매시업</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  /* ============ TOKENS & RESET ============ */
  :root{
    --ink:#0A0A0A; --ink-2:#1F1F1F; --paper:#F4EFE6; --paper-2:#EDE6D8; --paper-3:#E5DCC9;
    --line:#0a0a0a14; --line-2:#0a0a0a26; --muted:#6B6258; --muted-2:#9A9088;
    --accent:#FF4D1F; --accent-2:#1B3A7A; --accent-3:#E8C547;
    --good:#1F7A5A; --bad:#9B2D1F; --warn:#C76A1A; --card:#FFFFFF; --card-2:#FAF6EC;
    --overlay:rgba(10,10,10,.4); --sheet-bg:#FFFFFF;
    --shadow-sm:0 2px 8px -2px rgba(10,10,10,.08); --shadow-lg:0 24px 60px -20px rgba(10,10,10,.28);
    --radius-lg:24px; --dur-fast:160ms; --dur:220ms; --dur-slow:380ms; --ease:cubic-bezier(.22,.61,.36,1);
    --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  [data-theme="dark"]{
    --ink:#F4EFE6; --ink-2:#E5DCC9; --paper:#0F0E0C; --paper-2:#181614; --paper-3:#22201D;
    --line:#f4efe61c; --line-2:#f4efe636; --muted:#8A8074; --muted-2:#5F5750;
    --card:#1A1815; --card-2:#22201D; --overlay:rgba(0,0,0,.65); --sheet-bg:#1A1815;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#0a0a0a;font-family:'Pretendard',system-ui,sans-serif;color:var(--ink);}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
  input{font:inherit;color:inherit}
  ::-webkit-scrollbar{display:none;}

  /* ============ DEVICE & LAYOUT ============ */
  .device-wrap{height:100%;width:100%;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at top,#1c1816,#0a0a0a 70%);padding:24px;}
  .device{width:100%;max-width:420px;height:100%;max-height:920px;background:var(--paper);border-radius:48px;overflow:hidden;position:relative;box-shadow:0 30px 80px -20px rgba(0,0,0,.6), 0 0 0 10px #000, 0 0 0 11px #2a2a2a;display:flex;flex-direction:column;}
  @media (max-width:520px){ .device-wrap{padding:0;background:var(--paper)} .device{max-width:100%;max-height:100%;border-radius:0;box-shadow:none} }
  
  .app{flex:1;display:flex;flex-direction:column;position:relative;background:var(--paper);overflow:hidden;}
  .stage{flex:1;position:relative;overflow:hidden}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;background:var(--paper);overflow:hidden;transform:translateX(0);transition:transform var(--dur) var(--ease), opacity var(--dur) var(--ease);}
  .screen.fade-in{animation:fadeIn var(--dur) var(--ease)}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  
  .app-header{flex-shrink:0;padding:calc(10px + var(--safe-top)) 22px 10px;display:flex;align-items:center;justify-content:space-between;background:var(--paper);min-height:calc(52px + var(--safe-top));}
  .app-header .left{display:flex;align-items:center;gap:10px;flex:1}
  .h-title{font-size:17px;font-weight:700;letter-spacing:-.02em;}
  .h-action{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s;}
  .h-action:active{background:var(--line-2)}
  .scroll{flex:1;overflow-y:auto;padding-bottom:calc(96px + var(--safe-bottom));}
  .scroll.no-tab{padding-bottom:30px}

  /* ============ BOTTOM NAV ============ */
  .tab-bar{
    position:absolute;left:0;right:0;bottom:0; height:calc(76px + var(--safe-bottom)); padding-bottom:var(--safe-bottom);
    background:color-mix(in srgb, var(--paper) 92%, transparent); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--line); display:flex; z-index:10; transition:transform .3s;
  }
  .tab-bar.hidden{transform:translateY(110%)}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--muted);font-size:10px;font-weight:600;}
  .tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .tab.active{color:var(--ink)} .tab.active svg{stroke:var(--ink)}
  .tab .fab{width:52px;height:52px;border-radius:50%;background:var(--ink);color:var(--paper);display:grid;place-items:center;margin-top:-14px;box-shadow:var(--shadow-lg);transition:transform .2s;}
  .tab:active .fab{transform:scale(.92);background:var(--accent)}

  /* ============ COMPONENTS ============ */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;height:52px;padding:0 22px;border-radius:99px;font-size:15px;font-weight:700;transition:transform .15s, opacity .15s;}
  .btn:active{transform:scale(.97)} .btn-primary{background:var(--ink);color:var(--paper)} .btn-accent{background:var(--accent);color:#fff} .btn-block{width:100%} .btn-danger{background:#9B2D1F1f;color:var(--bad)}
  .card{background:var(--card);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-sm);}
  .avatar{border-radius:14px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;flex-shrink:0;}
  .avatar-md{width:52px;height:52px;font-size:21px} .avatar-lg{width:72px;height:72px;font-size:28px}
  .chip{display:inline-flex;align-items:center;padding:6px 12px;border-radius:99px;font-size:12px;font-weight:600;background:var(--line);color:var(--ink);}
  .chip-good{background:#1F7A5A1f;color:var(--good)} .chip-warn{background:#C76A1A1f;color:var(--warn)}
  .section{padding:0 22px;margin-bottom:24px} .section-h{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px;font-size:18px;font-weight:700}
  
  /* ============ TEAMS & MATCH ============ */
  .team-card{background:var(--card);border-radius:18px;padding:16px;width:100%;text-align:left;box-shadow:var(--shadow-sm);margin-bottom:10px;transition:transform .15s;}
  .team-card:active{transform:scale(.98)}
  .team-card-name{font-size:16px;font-weight:700;margin-bottom:4px}
  .team-card-meta{font-size:12px;color:var(--muted);font-weight:600}
  .team-avatars{display:flex;margin-top:12px;}
  .team-avatars .avatar{width:32px;height:32px;font-size:13px;border-radius:10px;border:2px solid var(--card);margin-left:-8px;}
  .team-avatars .avatar:first-child{margin-left:0}
  
  .match{background:var(--card);border-radius:18px;padding:14px;display:flex;align-items:center;gap:12px;width:100%;text-align:left;box-shadow:var(--shadow-sm);margin-bottom:8px;}
  .match-body{flex:1;min-width:0} .match-name{font-size:15px;font-weight:700} .match-meta{font-size:11px;color:var(--muted);font-weight:600}

  /* ============ INSIGHTS (RADAR & RING) ============ */
  .radar-wrap{position:relative;width:100%;max-width:280px;margin:0 auto;aspect-ratio:1}
  .radar svg{width:100%;height:100%;overflow:visible}
  .radar .grid{fill:none;stroke:var(--line-2);stroke-width:1}
  .radar .axis{stroke:var(--line);stroke-width:1}
  .radar .area{fill:var(--accent);fill-opacity:.2;stroke:var(--accent);stroke-width:2;stroke-linejoin:round}
  .radar .point{fill:var(--accent);stroke:var(--card);stroke-width:2}
  .radar .label{font-size:10px;font-weight:700;fill:var(--ink)}

  .score-ring{width:140px;height:140px;margin:0 auto 16px;position:relative;}
  .score-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
  .score-ring .track{fill:none;stroke:var(--line);stroke-width:10}
  .score-ring .fill{fill:none;stroke:var(--accent);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s ease-out;}
  .score-ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .score-ring-text .v{font-size:36px;font-weight:800;letter-spacing:-.03em;}

  .balance-bar{display:flex;height:36px;border-radius:12px;overflow:hidden;background:var(--card-2);margin-top:8px;}
  .balance-side{flex:1;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:flex .4s ease-out;}
  .balance-side.e{background:var(--accent-3);color:var(--ink)} .balance-side.i{background:var(--accent-2);color:#fff}

  .insight-card{background:var(--card);border-radius:18px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow-sm);}
  .insight-title{font-size:15px;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
  .insight-body{font-size:13px;color:var(--muted);line-height:1.5;}

  /* ============ SETTINGS ============ */
  .setting-row{width:100%;padding:16px 22px;display:flex;align-items:center;gap:12px;text-align:left;background:var(--card);border-bottom:1px solid var(--line);transition:background .15s;}
  .setting-row:active{background:var(--card-2)}
  .setting-icon{width:32px;height:32px;border-radius:10px;background:var(--paper-3);display:grid;place-items:center;}
  .setting-icon svg{width:16px;height:16px;stroke:var(--ink);fill:none;stroke-width:2;}
  .setting-body{flex:1} .setting-title{font-size:15px;font-weight:600} .setting-sub{font-size:12px;color:var(--muted)}
  .theme-seg{display:flex;gap:6px;padding:16px 22px;background:var(--card);}
  .theme-opt{flex:1;padding:12px;border-radius:12px;background:var(--card-2);font-size:12px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:6px;transition:background .2s;}
  .theme-opt.active{background:var(--ink);color:var(--paper)}

  /* ============ OVERLAYS ============ */
  .scrim{position:absolute;inset:0;background:var(--overlay);z-index:100;opacity:0;pointer-events:none;transition:opacity .2s;}
  .scrim.open{opacity:1;pointer-events:auto}
  .sheet{position:absolute;left:0;right:0;bottom:0;background:var(--sheet-bg);border-radius:28px 28px 0 0;z-index:110;transform:translateY(100%);transition:transform .3s var(--ease);display:flex;flex-direction:column;padding-bottom:var(--safe-bottom);}
  .sheet.open{transform:translateY(0)}
  .sheet-handle{width:36px;height:4px;background:var(--line-2);border-radius:99px;margin:12px auto 8px;}
  .sheet-head{padding:8px 22px 16px;font-size:18px;font-weight:700;}
  .sheet-body{padding:0 22px 24px;overflow-y:auto;max-height:60vh;}
  .toast-area{position:absolute;top:calc(16px + var(--safe-top));left:16px;right:16px;z-index:200;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
  .toast{background:var(--ink);color:var(--paper);padding:12px 18px;border-radius:14px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);animation:toastIn .3s var(--ease);pointer-events:auto;}
  .toast.success{background:var(--good);color:#fff} .toast.error{background:var(--bad);color:#fff}
  @keyframes toastIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>

<div class="device-wrap">
  <div class="device">
    <div class="app">
      <div class="stage" id="stage"></div>

      <nav class="tab-bar hidden" id="tabBar">
        <button class="tab" data-tab="home"><svg viewBox="0 0 24 24"><path d="M3 11l9-7 9 7v9a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2z"/></svg><span>홈</span></button>
        <button class="tab" data-tab="teams"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.5"/><path d="M3 19c0-3 2.5-5 6-5s6 2 6 5M14 19c0-2 1.5-3.5 3.5-3.5S21 17 21 19"/></svg><span>팀</span></button>
        <button class="tab center" data-tab="teamBuilder"><span class="fab"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" fill="none" stroke-width="2"/></svg></span></button>
        <button class="tab" data-tab="insights"><svg viewBox="0 0 24 24"><path d="M4 19V9m6 10V5m6 14v-7m6 7V11"/></svg><span>인사이트</span></button>
        <button class="tab" data-tab="settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>설정</span></button>
      </nav>
    </div>

    <div class="toast-area" id="toastArea"></div>
    <div class="scrim" id="scrim"></div>
    <div class="sheet" id="sheet"><div class="sheet-handle"></div><div class="sheet-head" id="sheetHead"></div><div class="sheet-body" id="sheetBody"></div></div>
    <input type="file" id="importFile" accept="application/json" style="display:none"/>
  </div>
</div>

<script>
/* ===================================================================
   SYSTEM & UTILS
   =================================================================== */
'use strict';
const STORAGE_KEY = 'oneteam_db_v3';
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));
const esc = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
const uid = (p='id') => `${p}_${Math.random().toString(36).slice(2,9)}`;
const pickColor = id => ['#FF4D1F','#1B3A7A','#E8C547','#1F7A5A','#9B2D1F'][Math.abs([...String(id)].reduce((a,c)=>a+c.charCodeAt(0),0))%5];
const initial = n => (n||'?').trim().charAt(0);
const clamp = (n,min,max) => Math.max(min, Math.min(max, n));

const Toast = {
  show(msg, kind='default'){
    const el = document.createElement('div'); el.className = `toast ${kind}`; el.textContent = msg;
    $('#toastArea').appendChild(el);
    setTimeout(() => { el.style.opacity=0; setTimeout(()=>el.remove(),300); }, 2000);
  }
};
const Sheet = {
  open(title, bodyHTML, opts={}){
    $('#sheetHead').innerHTML = esc(title); $('#sheetBody').innerHTML = bodyHTML;
    $('#sheet').classList.add('open'); $('#scrim').classList.add('open');
    if(opts.mount) opts.mount();
  },
  close(){ $('#sheet').classList.remove('open'); $('#scrim').classList.remove('open'); }
};

/* ===================================================================
   STATE MANAGEMENT (Store)
   =================================================================== */
const DEFAULT_STATE = {
  settings: { theme: 'system' },
  profile: { id:'p_me', name:'오석휘', mbti:'INFJ', traits:['리더십','통찰력','공감'], age:50 }, // User Profile 기반 기본 세팅
  customMembers: [
    { id:'c1', name:'정광용', mbti:'ENTJ', traits:['리더십','추진력'], age:48 },
    { id:'c2', name:'조인선', mbti:'ESFP', traits:['유연성','공감'], age:47 },
    { id:'c3', name:'최순철', mbti:'ENTP', traits:['창의성','분석력'], age:42 }
  ],
  teams: [
    { id:'t1', name:'데이터 거버넌스 코어', memberIds:['p_me', 'c1', 'c3'], createdAt: Date.now() }
  ]
};

const Store = {
  state: structuredClone(DEFAULT_STATE),
  load(){ const raw = localStorage.getItem(STORAGE_KEY); if(raw) this.state = {...DEFAULT_STATE, ...JSON.parse(raw)}; },
  save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(this.state)); },
  member(id){ return [this.state.profile, ...this.state.customMembers].find(m => m && m.id === id); }
};

/* ===================================================================
   CHEMISTRY ANALYTICS ENGINE
   =================================================================== */
function analyzeTeam(memberIds){
  const members = memberIds.map(id => Store.member(id)).filter(Boolean);
  if(!members.length) return { scores:{leadership:0, execution:0, creativity:0, analysis:0, empathy:0}, overall:0, eiBalance:{e:50,i:50}, strengths:[], gaps:[], count:0 };

  let s = { leadership:0, execution:0, creativity:0, analysis:0, empathy:0 };
  const traitMap = { '리더십':'leadership', '추진력':'leadership', '실행력':'execution', '꼼꼼함':'execution', '창의성':'creativity', '분석력':'analysis', '통찰력':'analysis', '공감':'empathy', '협업':'empathy' };
  
  let eCount = 0;
  members.forEach(m => {
    // 성향(Traits) 가중치
    (m.traits||[]).forEach(t => { if(traitMap[t]) s[traitMap[t]] += 20; });
    
    // MBTI 알파벳 가중치
    if(m.mbti){
      if(m.mbti[0]==='E') { s.leadership+=10; eCount++; }
      if(m.mbti[1]==='S') { s.execution+=15; }
      if(m.mbti[1]==='N') { s.creativity+=15; }
      if(m.mbti[2]==='T') { s.analysis+=15; }
      if(m.mbti[2]==='F') { s.empathy+=15; }
      if(m.mbti[3]==='J') { s.execution+=10; s.leadership+=5; }
    }
  });

  // 점수 정규화 (100점 만점 기준 보정)
  const maxPer = Math.max(members.length * 25, 100);
  Object.keys(s).forEach(k => s[k] = clamp(Math.round((s[k]/maxPer)*100), 20, 100));

  const strengths = [], gaps = [];
  const axisLabel = { leadership:'리더십', execution:'실행력', creativity:'창의성', analysis:'분석력', empathy:'공감조율' };
  Object.entries(s).forEach(([k,v]) => { if(v>=75) strengths.push(axisLabel[k]); else if(v<45) gaps.push(axisLabel[k]); });
  
  const overall = Math.round((s.leadership + s.execution + s.creativity + s.analysis + s.empathy) / 5);
  const ePer = Math.round((eCount / members.length) * 100);

  return { scores:s, overall, eiBalance:{ e:ePer, i:100-ePer }, strengths, gaps, count:members.length };
}

// 5각 레이더 차트 SVG 생성 함수
function renderRadarChart(data){
  const size = 240, cx = size/2, cy = size/2, r = 85;
  const angleAt = i => -Math.PI/2 + (i * 2*Math.PI/5);
  const pt = (i, val) => [cx + r*(val/100)*Math.cos(angleAt(i)), cy + r*(val/100)*Math.sin(angleAt(i))];
  
  const rings = [0.2, 0.4, 0.6, 0.8, 1].map(k => `<polygon class="grid" points="${[0,1,2,3,4].map(i => `${cx + r*k*Math.cos(angleAt(i))},${cy + r*k*Math.sin(angleAt(i))}`).join(' ')}"/>`).join('');
  const axes = [0,1,2,3,4].map(i => `<line class="axis" x1="${cx}" y1="${cy}" x2="${pt(i,100)[0]}" y2="${pt(i,100)[1]}"/>`).join('');
  
  const dataPts = data.map((d,i) => pt(i, d.value).join(',')).join(' ');
  const points = data.map((d,i) => `<circle class="point" cx="${pt(i, d.value)[0]}" cy="${pt(i, d.value)[1]}" r="4"/>`).join('');
  
  const labels = data.map((d,i) => {
    const [x,y] = [cx + (r+22)*Math.cos(angleAt(i)), cy + (r+22)*Math.sin(angleAt(i))];
    const anchor = Math.abs(x-cx)<10 ? 'middle' : x>cx ? 'start' : 'end';
    return `<text class="label" x="${x}" y="${y}" text-anchor="${anchor}" dominant-baseline="middle">${d.label} ${d.value}</text>`;
  }).join('');

  return `<div class="radar-wrap"><div class="radar"><svg viewBox="0 0 ${size} ${size}">${rings}${axes}<polygon class="area" points="${dataPts}"/>${points}${labels}</svg></div></div>`;
}

/* ===================================================================
   ROUTING & VIEWS
   =================================================================== */
const Router = {
  current: null,
  go(name, params={}){
    this.current = { name, params };
    $('#stage').innerHTML = `<div class="screen fade-in">${Views[name](params)}</div>`;
    if(Views[name].mount) Views[name].mount(params);
    const showTabs = ['home','teams','insights','settings'].includes(name);
    $('#tabBar').classList.toggle('hidden', !showTabs);
    $$('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  }
};

const avatarHTML = m => `<div class="avatar avatar-md" style="background:${pickColor(m.id)}">${esc(initial(m.name))}</div>`;

const Views = {};

/* --- HOME --- */
Views.home = () => `
  <div class="app-header"><div class="left"><span class="h-title">One Team</span></div></div>
  <div class="scroll">
    <div class="card" style="margin:0 22px 24px; background:var(--ink); color:var(--paper)">
      <div style="font-size:24px;font-weight:800;margin-bottom:8px">팀의 화학을 설계하다</div>
      <div style="font-size:14px;opacity:0.8">MBTI와 업무 성향을 바탕으로<br>최적의 팀 조합을 찾아보세요.</div>
    </div>
    <div class="section">
      <div class="section-h"><span class="h3">내 프로필</span></div>
      <div class="match">
        ${avatarHTML(Store.state.profile)}
        <div class="match-body"><div class="match-name">${Store.state.profile.name}</div><div class="match-meta">${Store.state.profile.mbti}</div></div>
      </div>
    </div>
  </div>
`;

/* --- TEAMS (팀 목록) --- */
Views.teams = () => `
  <div class="app-header">
    <div class="left"><span class="h-title">팀 관리</span></div>
    <div class="right"><button class="h-action" onclick="Router.go('teamBuilder')"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button></div>
  </div>
  <div class="scroll">
    <div class="section" id="teamListContainer"></div>
  </div>
`;
Views.teams.mount = () => {
  const container = $('#teamListContainer');
  if(!Store.state.teams.length){ container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">생성된 팀이 없습니다.</div>'; return; }
  
  container.innerHTML = Store.state.teams.map(t => {
    const analysis = analyzeTeam(t.memberIds);
    const avatars = t.memberIds.slice(0,5).map(id => {
      const m = Store.member(id); return m ? `<div class="avatar" style="background:${pickColor(id)}">${esc(initial(m.name))}</div>` : '';
    }).join('');
    return `
      <button class="team-card" data-team="${t.id}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><div class="team-card-name">${esc(t.name)}</div><div class="team-card-meta">멤버 ${t.memberIds.length}명 · 종합 ${analysis.overall}점</div></div>
          <div style="font-size:22px;font-weight:800;color:var(--accent)">${analysis.overall}</div>
        </div>
        <div class="team-avatars">${avatars}${t.memberIds.length>5?`<div class="avatar" style="background:var(--card-2);color:var(--muted)">+</div>`:''}</div>
      </button>
    `;
  }).join('');

  $$('[data-team]').forEach(b => b.addEventListener('click', () => Router.go('teamDetail', {id: b.dataset.team})));
};

/* --- TEAM DETAIL (팀 상세 분석 - 실제 앱 기능 핵심) --- */
Views.teamDetail = ({id}) => {
  const team = Store.team(id);
  if(!team) return `<div class="app-header"><button class="h-back" onclick="Router.go('teams')"><svg viewBox="0 0 24 24" width="20" stroke="currentColor" fill="none"><path d="M15 18l-6-6 6-6"/></svg></button></div><div class="scroll"><div style="padding:40px;text-align:center">팀을 찾을 수 없습니다.</div></div>`;
  
  const analysis = analyzeTeam(team.memberIds);
  const radarData = [
    { label:'리더십', value:analysis.scores.leadership }, { label:'실행력', value:analysis.scores.execution },
    { label:'창의성', value:analysis.scores.creativity }, { label:'분석력', value:analysis.scores.analysis },
    { label:'공감조율', value:analysis.scores.empathy }
  ];

  return `
    <div class="app-header">
      <div class="left"><button class="h-back" onclick="Router.go('teams')"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button><span class="h-title">${esc(team.name)}</span></div>
      <div class="right"><button class="h-action" id="btnDeleteTeam" style="color:var(--bad)"><svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button></div>
    </div>
    <div class="scroll no-tab">
      <div class="section"><div class="card">${renderRadarChart(radarData)}</div></div>
      <div class="section">
        <div class="section-h"><span class="h3">팀 밸런스</span></div>
        <div class="card">
          <div style="font-size:14px;font-weight:600;margin-bottom:8px">E/I 에너지 방향</div>
          <div class="balance-bar">
            <div class="balance-side e" style="flex:${analysis.eiBalance.e}">E ${analysis.eiBalance.e}%</div>
            <div class="balance-side i" style="flex:${analysis.eiBalance.i}">I ${analysis.eiBalance.i}%</div>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-h"><span class="h3">멤버 구성 (${team.memberIds.length}명)</span></div>
        ${team.memberIds.map(mid => {
          const m = Store.member(mid);
          return m ? `<div class="match">${avatarHTML(m)}<div class="match-body"><div class="match-name">${esc(m.name)}</div><div class="match-meta">${esc(m.mbti)} · ${m.traits.join(', ')}</div></div></div>` : '';
        }).join('')}
      </div>
    </div>
  `;
};
Views.teamDetail.mount = ({id}) => {
  $('#btnDeleteTeam').addEventListener('click', () => {
    Store.state.teams = Store.state.teams.filter(t => t.id !== id);
    Store.save(); Toast.show('팀이 삭제되었습니다.', 'success'); Router.go('teams');
  });
};

/* --- INSIGHTS (인사이트 리포트) --- */
Views.insights = () => {
  const teams = Store.state.teams;
  if(!teams.length) return `<div class="app-header"><div class="left"><span class="h-title">인사이트</span></div></div><div class="scroll"><div style="padding:40px;text-align:center;color:var(--muted)">분석할 팀이 없습니다.</div></div>`;
  
  // 가장 최근 팀 기준 분석
  const team = teams[teams.length-1];
  const analysis = analyzeTeam(team.memberIds);
  
  // 도넛 차트 계산
  const c = 2*Math.PI*60;
  const offset = c * (1 - analysis.overall/100);
  
  // 인사이트 추천 로직
  let recs = [];
  if(analysis.gaps.includes('실행력')) recs.push({ t:'실행력 보완 필요', d:'아이디어를 구체화하고 끝맺을 S(감각) 및 J(판단) 성향의 멤버 배치가 시급합니다.', icon:'⚠️' });
  if(analysis.eiBalance.e > 75) recs.push({ t:'에너지 분산 주의', d:'외향(E) 비율이 너무 높습니다. 회의가 길어질 수 있으니 명확한 타임키퍼 역할이 필요합니다.', icon:'⏱' });
  if(analysis.strengths.length >= 3) recs.push({ t:'강력한 시너지 기대', d:`${analysis.strengths.join(', ')} 역량이 매우 뛰어난 드림팀입니다.`, icon:'🔥' });
  if(recs.length===0) recs.push({ t:'균형 잡힌 스쿼드', d:'전반적인 능력치 밸런스가 좋은 안정적인 팀입니다.', icon:'✅' });

  return `
    <div class="app-header"><div class="left"><span class="h-title">AI 팀 리포트</span></div></div>
    <div class="scroll">
      <div class="section">
        <div class="card" style="text-align:center">
          <div style="font-size:14px;font-weight:700;color:var(--muted);margin-bottom:16px">${esc(team.name)} 종합 점수</div>
          <div class="score-ring">
            <svg viewBox="0 0 140 140">
              <circle class="track" cx="70" cy="70" r="60"/>
              <circle class="fill" cx="70" cy="70" r="60" stroke-dasharray="${c}" stroke-dashoffset="${c}"/>
            </svg>
            <div class="score-ring-text"><div class="v">${analysis.overall}</div></div>
          </div>
          <div style="display:flex;justify-content:center;gap:6px;flex-wrap:wrap">
            ${analysis.strengths.map(s => `<span class="chip chip-good">${s} 강점</span>`).join('')}
            ${analysis.gaps.map(g => `<span class="chip chip-warn">${g} 부족</span>`).join('')}
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-h"><span class="h3">전략 제안</span></div>
        ${recs.map(r => `
          <div class="insight-card">
            <div class="insight-title"><span>${r.icon}</span> ${r.t}</div>
            <div class="insight-body">${r.d}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
};
Views.insights.mount = () => {
  // 도넛 차트 애니메이션 트리거
  setTimeout(() => {
    const fill = $('.score-ring .fill');
    if(fill) {
      const teams = Store.state.teams;
      if(teams.length){
        const a = analyzeTeam(teams[teams.length-1].memberIds);
        const c = 2*Math.PI*60;
        fill.style.strokeDashoffset = c * (1 - a.overall/100);
      }
    }
  }, 100);
};

/* --- TEAM BUILDER (임시 생략 방지용 기본 UI) --- */
const BuilderState = { selected: new Set() };
Views.teamBuilder = () => {
  BuilderState.selected = new Set(['p_me']); // 자신은 기본 포함
  return `
    <div class="app-header">
      <div class="left"><button class="h-back" onclick="Router.go('teams')"><svg viewBox="0 0 24 24" width="20" stroke="currentColor" fill="none"><path d="M15 18l-6-6 6-6"/></svg></button><span class="h-title">팀 빌딩</span></div>
      <div class="right"><button class="h-action" id="btnSaveBuilder"><svg viewBox="0 0 24 24" width="20" stroke="var(--accent)" fill="none" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg></button></div>
    </div>
    <div class="scroll" id="builderList"></div>
  `;
};
Views.teamBuilder.mount = () => {
  const render = () => {
    const pool = [Store.state.profile, ...Store.state.customMembers];
    $('#builderList').innerHTML = pool.map(m => {
      const sel = BuilderState.selected.has(m.id);
      return `<div class="setting-row" style="background:${sel?'var(--card-2)':'var(--card)'}" data-pick="${m.id}">
        ${avatarHTML(m)}
        <div class="setting-body" style="margin-left:12px"><div class="setting-title">${m.name}</div><div class="setting-sub">${m.mbti}</div></div>
        ${sel ? `<svg width="24" height="24" stroke="var(--accent)" fill="none" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>` : `<div style="width:24px;height:24px;border:2px solid var(--line-2);border-radius:50%"></div>`}
      </div>`;
    }).join('');
    $$('[data-pick]').forEach(el => el.addEventListener('click', () => {
      const id = el.dataset.pick;
      BuilderState.selected.has(id) ? BuilderState.selected.delete(id) : BuilderState.selected.add(id);
      render();
    }));
  };
  render();

  $('#btnSaveBuilder').addEventListener('click', () => {
    if(BuilderState.selected.size < 2) return Toast.show('2명 이상 선택해주세요.', 'error');
    Store.state.teams.push({ id: uid('t'), name: `새 프로젝트 팀 (${BuilderState.selected.size}명)`, memberIds: Array.from(BuilderState.selected), createdAt: Date.now() });
    Store.save(); Toast.show('팀이 생성되었습니다.', 'success'); Router.go('teams');
  });
};


/* --- SETTINGS (실제 모바일 앱 기능: 백업/복원, 테마) --- */
Views.settings = () => `
  <div class="app-header"><div class="left"><span class="h-title">설정</span></div></div>
  <div class="scroll">
    <div class="section">
      <div style="font-size:12px;font-weight:700;color:var(--muted);margin:0 0 8px 16px">화면 설정</div>
      <div class="theme-seg">
        <button class="theme-opt ${Store.state.settings.theme==='light'?'active':''}" data-theme="light"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg><span>라이트</span></button>
        <button class="theme-opt ${Store.state.settings.theme==='dark'?'active':''}" data-theme="dark"><svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg><span>다크</span></button>
        <button class="theme-opt ${Store.state.settings.theme==='system'?'active':''}" data-theme="system"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg><span>시스템 동기화</span></button>
      </div>
    </div>
    
    <div class="section">
      <div style="font-size:12px;font-weight:700;color:var(--muted);margin:0 0 8px 16px">데이터 관리</div>
      <div style="border-radius:16px;overflow:hidden;box-shadow:var(--shadow-sm)">
        <button class="setting-row" id="btnExport">
          <div class="setting-icon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg></div>
          <div class="setting-body"><div class="setting-title">데이터 백업 (내보내기)</div><div class="setting-sub">로컬 기기에 .json 파일 저장</div></div>
        </button>
        <button class="setting-row" id="btnImport">
          <div class="setting-icon"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 14l5-5 5 5M12 9v12"/></svg></div>
          <div class="setting-body"><div class="setting-title">데이터 복원 (가져오기)</div><div class="setting-sub">백업 파일 불러오기</div></div>
        </button>
        <button class="setting-row" id="btnReset" style="border-bottom:none">
          <div class="setting-icon" style="background:#9B2D1F1f"><svg viewBox="0 0 24 24" stroke="var(--bad)"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2M5 6l1 14a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2l1-14"/></svg></div>
          <div class="setting-body"><div class="setting-title" style="color:var(--bad)">모든 데이터 초기화</div><div class="setting-sub">앱을 처음 상태로 되돌립니다.</div></div>
        </button>
      </div>
    </div>
  </div>
`;
Views.settings.mount = () => {
  // Theme 처리
  $$('[data-theme]').forEach(b => b.addEventListener('click', () => {
    Store.state.settings.theme = b.dataset.theme; Store.save();
    applyTheme();
    $$('[data-theme]').forEach(x => x.classList.toggle('active', x===b));
  }));

  // Export (로컬 파일 시스템 다운로드)
  $('#btnExport').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(Store.state, null, 2)], { type:'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `OneTeam_Backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
    Toast.show('백업 파일이 저장되었습니다.', 'success');
  });

  // Import (input type="file" 트리거)
  $('#btnImport').addEventListener('click', () => $('#importFile').click());
  $('#importFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if(!data.teams) throw new Error();
        Store.state = data; Store.save(); applyTheme();
        Toast.show('데이터가 성공적으로 복원되었습니다.', 'success');
        Router.go('home');
      } catch(err) { Toast.show('잘못된 백업 파일입니다.', 'error'); }
      e.target.value = ''; // Reset input
    };
    reader.readAsText(file);
  });

  // Reset
  $('#btnReset').addEventListener('click', () => {
    Dialog.open({
      title:'정말 초기화 하시겠습니까?', body:'저장된 팀과 프로필이 모두 삭제됩니다.', danger:true, confirmText:'초기화',
      onConfirm: () => {
        Store.state = structuredClone(DEFAULT_STATE); Store.save(); applyTheme();
        Toast.show('초기화 완료', 'success'); Router.go('home');
      }
    });
  });
};

/* ===================================================================
   SYSTEM BOOTSTRAP
   =================================================================== */
function applyTheme() {
  let t = Store.state.settings.theme;
  if(t === 'system') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', t);
  $('#meta-theme').setAttribute('content', t === 'dark' ? '#0F0E0C' : '#0a0a0a');
}

function boot(){
  Store.load();
  applyTheme();
  
  // 시스템 테마 변경 감지
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if(Store.state.settings.theme === 'system') applyTheme();
  });

  // Scrim 닫기 이벤트
  $('#scrim').addEventListener('click', () => { if($('#sheet').classList.contains('open')) Sheet.close(); else Dialog.close(); });

  Router.go('splash');
}

document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
