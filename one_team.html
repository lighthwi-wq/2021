<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#000000" id="meta-theme">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="One Team">
<title>One Team — AI 팀원 매시업</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<svg style="width:0;height:0;position:absolute;" aria-hidden="true">
  <defs>
    <linearGradient id="radarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF3300" />
      <stop offset="100%" stop-color="#7000FF" />
    </linearGradient>
  </defs>
</svg>

<div class="device-wrap">
  <div class="device">
    <div class="app">
      <div class="stage" id="stage"></div>
      <nav class="tab-bar hidden" id="tabBar">
        <button class="tab" data-tab="home">
          <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          <span>홈</span>
        </button>
        <button class="tab" data-tab="teams">
          <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>스쿼드</span>
        </button>
        <button class="tab center" data-tab="teamBuilder">
          <span class="fab"><svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg></span>
        </button>
        <button class="tab" data-tab="settings">
          <svg viewBox="0 0 24 24"><path d="M10 2v7.31L2.07 19.46A2 2 0 0 0 3.79 23h16.42a2 2 0 0 0 1.72-3.54L14 9.31V2"/><path d="M7 2h10"/><path d="M8 14h8"/></svg>
          <span>화학실</span>
        </button>
      </nav>
    </div>
    <div class="toast-area" id="toastArea"></div>
    <div class="scrim" id="scrim"></div>
    <div class="sheet" id="sheet"><div class="sheet-handle"></div><div class="sheet-head" id="sheetHead"></div><div class="sheet-body" id="sheetBody"></div></div>
  </div>
</div>

<script src="./script.js"></script>
</body>
</html>
